<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro IPTV Platform</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;font-family:sans-serif;background:#020617;color:white}
header{padding:10px;background:#0f172a;display:flex;justify-content:space-between}
.container{display:flex;height:calc(100vh - 50px)}
.sidebar{width:320px;background:#020617;overflow:auto}
.player{flex:1;position:relative}
video{width:100%;height:100%;background:black}
.channel{display:flex;align-items:center;padding:10px;cursor:pointer}
.channel img{width:40px;height:40px;margin-right:10px}
.channel:hover,.active{background:#1e293b}
.category{padding:10px;font-weight:bold;background:#020617}
.topbar{display:flex;gap:10px;padding:10px}
button{padding:6px 10px}
</style>
</head>
<body>
<header>
<h3>🔥 Pro IPTV</h3>
<div>
<button onclick="toggleFull()">Fullscreen</button>
</div>
</header>

<div class="container">
<div class="sidebar" id="list"></div>
<div class="player">
<video id="video" controls></video>
</div>
</div>

<script>
const M3U_URL = "https://raw.githubusercontent.com/kadirsener1/tivim/refs/heads/main/merged.m3u";
let channels=[];
let history=[];
let favorites = JSON.parse(localStorage.getItem('fav')||'[]');

function saveFav(){localStorage.setItem('fav',JSON.stringify(favorites))}

function play(url,name){
 const video=document.getElementById('video');
 history.unshift(name);
 if(Hls.isSupported() && url.includes('m3u8')){
  const hls=new Hls();
  hls.loadSource(url);
  hls.attachMedia(video);
 } else video.src=url;
}

function toggleFav(name){
 if(favorites.includes(name)){
  favorites=favorites.filter(f=>f!==name)
 }else favorites.push(name);
 saveFav(); render();
}

function render(){
 const list=document.getElementById('list');
 list.innerHTML='';
 const groups={};
 channels.forEach(c=>{
  if(!groups[c.group]) groups[c.group]=[];
  groups[c.group].push(c);
 });

 for(let g in groups){
  list.innerHTML+=`<div class='category'>📂 ${g}</div>`;
  groups[g].forEach(c=>{
   const fav = favorites.includes(c.name) ? '⭐' : '☆';
   list.innerHTML+=`
   <div class='channel' onclick="play('${c.url}','${c.name}')">
   <img src="${c.logo||''}" onerror="this.style.display='none'">
   <div>
   <div>${c.name}</div>
   <small>${fav}</small>
   </div>
   <button onclick="event.stopPropagation();toggleFav('${c.name}')">Fav</button>
   </div>`;
  });
 }
}

function parseM3U(text){
 const lines=text.split('\n');
 let current={};
 lines.forEach(line=>{
  if(line.startsWith('#EXTINF')){
   const name=line.split(',')[1];
   const group=line.match(/group-title="(.*?)"/)?.[1]||'Diğer';
   const logo=line.match(/tvg-logo="(.*?)"/)?.[1];
   current={name,group,logo};
  }else if(line.startsWith('http')){
   current.url=line.trim();
   channels.push(current);
  }
 });
 render();
}

async function init(){
 const res=await fetch(M3U_URL);
 const txt=await res.text();
 parseM3U(txt);
}

function toggleFull(){
 const v=document.getElementById('video');
 if(document.fullscreenElement) document.exitFullscreen();
 else v.requestFullscreen();
}

// TV Remote
window.addEventListener('keydown',e=>{
 const items=document.querySelectorAll('.channel');
 let i=[...items].findIndex(x=>x.classList.contains('active'));
 if(e.key==='ArrowDown') i++;
 if(e.key==='ArrowUp') i--;
 if(e.key==='Enter') items[i]?.click();
 items.forEach(x=>x.classList.remove('active'));
 items[i]?.classList.add('active');
});

init();
</script>

</body>
</html>
