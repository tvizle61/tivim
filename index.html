<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 ARAC TV & YOUTUBE PLAYER </title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080b10;
    --bg2:     #0e1318;
    --bg3:     #141a22;
    --border: rgba(255,255,255,0.06);
    --accent: #e8373d;
    --gold:   #f5c842;
    --text:   #e8eaf0;
    --muted:  #5a6478;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .app {
    display: grid;
    grid-template-columns: 185px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .sidebar-tabs {
    display: flex;
    padding: 0 6px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    background: none; border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.3px; text-transform: uppercase;
    padding: 10px 2px;
    cursor: pointer;
    transition: all .2s;
  }

  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

  .ch-count {
    padding: 4px 8px 1px;
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .channel-list {
    overflow-y: auto;
    flex: 1;
    padding: 3px 4px 56px; 
  }

  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  .channel {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 6px;
    border-radius: 6px;
    margin-bottom: 3px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .2s;
    background: rgba(255,255,255,0.02);
    width: 100%;
  }

  .channel:hover { background: var(--bg3); }

  .channel.active {
    background: rgba(232,55,61,.15);
    border: 1.5px solid var(--accent) !important;
  }

  .ch-logo {
    width: 24px; height: 24px;
    border-radius: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .ch-logo img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 1px;
    background: #0e1318;
  }

  .ch-info { flex: 1; min-width: 0; }

  .ch-name {
    font-size: 10px; font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  .ch-meta {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 1px;
    line-height: 1;
  }

  .live-badge { background: var(--accent); color: #fff; font-size: 7px; font-weight: 700; padding: 1px 3px; border-radius: 2px; flex-shrink: 0; }
  .yt-badge { background: #ff0000; color: #fff; font-size: 7px; font-weight: 700; padding: 1px 3px; border-radius: 2px; flex-shrink: 0; }

  .ch-group {
    font-size: 9px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .fav-btn {
    background: none; border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    transition: color .2s, transform .2s;
    flex-shrink: 0;
    padding: 1px;
    line-height: 1;
  }

  .fav-btn:hover  { color: var(--gold); transform: scale(1.1); }
  .fav-btn.on     { color: var(--gold); }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 11px;
  }

  .spin {
    width: 24px; height: 24px;
    border: 2px solid var(--bg3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .sidebar-ctrl {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    height: 52px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 6px;
    z-index: 999;
  }

  .sidebar-ctrl .cb {
    flex: 1;
    height: 40px;
    margin: 0 2px;
    border-radius: 5px;
    background: var(--bg3);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all .2s ease;
  }

  .sidebar-ctrl .cb:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .sidebar-ctrl .cb.danger:hover { background: #c0392b; border-color: #c0392b; }

  .main {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #000;
    overflow: hidden;
  }

  .player-wrap { 
    position: relative; 
    background: #000; 
    flex: 1; 
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .player-ratio {
    position: relative;
    width: 100%;
    flex: 1;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 30px; 
  }

  .player-idle {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #0d1520 0%, #000 70%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    z-index: 2;
    padding-bottom: 30px;
  }

  .idle-icon { font-size: 64px; opacity: .13; animation: breathe 3s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { opacity:.08; transform:scale(1); } 50% { opacity:.2; transform:scale(1.05); } }
  .idle-txt { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 4px; color: var(--muted); }

  #video, .yt-container {
    width: 100%; 
    height: 100%;
    background: #000;
    display: none;
    object-fit: fill; 
  }

  .yt-container { position: absolute; inset: 0; border: none; padding-bottom: 30px; }

  .ctrl-bar {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 0 8px; 
    display: flex;
    align-items: center;
    justify-content: flex-start;
    flex-shrink: 0;
    z-index: 9;
    
    position: fixed;
    bottom: 0;
    right: 0;
    left: 185px; 
    height: 30px; 
    box-shadow: 0 -4px 10px rgba(0,0,0,0.4);
  }

  .cat-bar {
    display: flex;
    gap: 4px;
    padding: 2px 0; 
    overflow-x: auto;
    flex: 1;
    align-items: center;
    user-select: none;
    cursor: grab;
    scroll-behavior: smooth;
  }

  .cat-bar::-webkit-scrollbar { display: none; }

  .cat-pill {
    background: #1c2530; 
    border: 1px solid rgba(255, 255, 255, 0.18); 
    color: #ffffff !important; 
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 700; 
    padding: 3px 10px; 
    border-radius: 3px; 
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
    text-shadow: 0px 1px 2px rgba(0,0,0,0.8); 
  }

  .cat-pill.active, .cat-pill:hover {
    background: #ffffff !important; 
    border-color: #ffffff !important;
    color: #000000 !important; 
    text-shadow: none;
    font-weight: 800;
  }

  .toast {
    position: fixed;
    bottom: 45px;
    right: 24px;
    background: rgba(14, 19, 24, 0.9);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
    pointer-events: none;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
    .main { order: 1; height: auto; }
    .sidebar { order: 2; border-right: none; border-top: 1px solid var(--border); height: 50vh; }
    .player-ratio { height: 56.25vw; flex: none; padding-bottom: 30px; }
    .ctrl-bar { position: fixed; bottom: 0; left: 0; width: 100%; }
    .channel-list { max-height: calc(50vh - 108px); padding-bottom: 56px; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebarNode">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('all', this)">TÜM KANALLAR</button>
      <button class="tab-btn" onclick="switchTab('fav', this)">⭐ FAVORİLER</button>
    </div>
    <div class="ch-count" id="chCount"></div>
    <div class="channel-list" id="channelList">
      <div class="loading">
        <div class="spin"></div>
        Kanallar ve Videolar Yükleniyor...
      </div>
    </div>

    <div class="sidebar-ctrl" id="actionButtons">
      <button class="cb" onclick="prevCh()">⏮</button>
      <button class="cb" onclick="nextCh()">⏭</button>
      <button class="cb danger" onclick="stopPlayer()">⏹</button>
      <button class="cb" onclick="toggleFSSmart()">⛶</button>
    </div>
  </aside>

  <main class="main">
    <div class="player-wrap" id="playerWrapContainer">
      
      <div class="player-ratio" id="playerRatioNode">
        <div class="player-idle" id="playerIdle">
          <div class="idle-icon">📺</div>
          <div class="idle-txt">İZLEMEK İÇİN KANAL SEÇİN</div>
        </div>
        
        <video id="video" controls playsinline></video>
        <div id="ytPlayerWrap" class="yt-container"></div>
      </div>

      <div class="ctrl-bar" id="bottomCtrlBar">
        <div class="cat-bar" id="catBar">
          <button class="cat-pill active" onclick="filterCat('', this)">Tümü</button>
        </div>
      </div>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const PRIVATE_CLOUDFLARE_PROXY = "https://ancient-hall-8d94.deepbluee61.workers.dev/?url=";

const M3U_URLS = [
  "https://raw.githubusercontent.com/kadirsener1/avva/refs/heads/main/pplaylist.m3u",
  "https://raw.githubusercontent.com/tvizle61/tv/refs/heads/main/toplu.m3u",
  "https://raw.githubusercontent.com/tvizle61/plustv/refs/heads/main/ttv.m3u",
  "https://raw.githubusercontent.com/tvizle61/plustv/refs/heads/main/ttv1.m3u"
];

let hls;
let ytPlayerInstance = null;
let favorites   = JSON.parse(localStorage.getItem("favorites") || "[]");
let allChannels = [];
let currentCh   = null;
let currentTab  = "all";
let currentCat  = "";
const uniqueKeys = new Set();

const fetchM3uPromises = M3U_URLS.map(url => 
  fetch(url).then(r => r.ok ? r.text() : "").catch(() => "")
);

Promise.all(fetchM3uPromises)
  .then(m3uResults => {
    m3uResults.forEach(text => {
      if (!text) return;
      const lines = text.split("\n");
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith("#EXTINF")) {
          const name  = lines[i].split(",")[1]?.trim() || "Kanal";
          const url     = lines[i + 1]?.trim() || "";
          if (!url.startsWith("http")) continue;
          if (uniqueKeys.has(url)) continue;
          
          const gm    = lines[i].match(/group-title="([^"]*)"/i);
          const lm    = lines[i].match(/tvg-logo="([^"]*)"/i);
          
          uniqueKeys.add(url);
          allChannels.push({
            name, url,
            group: gm ? gm[1].trim() || "Genel" : "Genel",
            logo:  lm ? lm[1].trim() : ""
          });
        }
      }
    });
    return fetch("channels.json").then(r => r.ok ? r.json() : {channels: []}).catch(() => ({channels: []}));
  })
  .then(jsonData => {
    if (jsonData && jsonData.channels) {
      jsonData.channels.forEach(ch => {
        const idKey = ch.url || ch.youtubeId;
        if (idKey && !uniqueKeys.has(idKey)) {
          uniqueKeys.add(idKey);
          allChannels.push(ch);
        }
      });
    }

    allChannels.sort((a, b) => a.name.localeCompare(b.name, 'tr'));
    buildCats();
    renderList();
  });

function getSmartGroup(g) { return g || "Genel"; }

// Kategorileri Sayısal/Alfabetik Sıralayan Yeni Fonksiyon
function buildCats() {
  const rawGroups = [...new Set(allChannels.map(c => getSmartGroup(c.group)))];
  
  // Numaralandırmaya göre (1., 2., 10.) akıllı sıralama yapar
  rawGroups.sort((a, b) => {
    const numA = parseInt(a.match(/^\d+/)?.[0] || 9999);
    const numB = parseInt(b.match(/^\d+/)?.[0] || 9999);
    if (numA !== numB) return numA - numB;
    return a.localeCompare(b, 'tr');
  });

  const groups = ["", ...rawGroups];
  document.getElementById("catBar").innerHTML = groups.map((g, i) =>
    `<button class="cat-pill ${i === 0 ? "active" : ""}" onclick="filterCat('${g.replace(/'/g,"\\'")}',this)">${i === 0 ? "Tümü" : g}</button>`
  ).join("");
  initDragToScroll();
}

function initDragToScroll() {
  const slider = document.getElementById('catBar');
  let isDown = false; let startX; let scrollLeft;
  slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
  slider.addEventListener('mouseleave', () => isDown = false);
  slider.addEventListener('mouseup', () => isDown = false);
  slider.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - slider.offsetLeft; const walk = (x - startX) * 1.5; slider.scrollLeft = scrollLeft - walk; });
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll(".cat-pill").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderList();
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderList();
}

function renderList() {
  let list = allChannels;
  if (currentTab === "fav") list = list.filter(c => favorites.includes(c.url || c.youtubeId));
  if (currentCat)            list = list.filter(c => getSmartGroup(c.group) === currentCat);

  document.getElementById("chCount").textContent = list.length + " kanal/video";
  const el = document.getElementById("channelList");

  el.innerHTML = list.map(ch => {
    const idx   = allChannels.indexOf(ch);
    const idKey = ch.url || ch.youtubeId;
    const isAct = currentCh && (currentCh.url === ch.url && currentCh.youtubeId === ch.youtubeId);
    const isFav = favorites.includes(idKey);
    const logo  = ch.logo ? `<img src="${ch.logo}" onerror="this.outerHTML='<span>📺</span>'">` : `<span>📺</span>`;

    return `
      <div class="channel ${isAct ? "active" : ""}" onclick="play(${idx})">
        <div class="ch-logo">${logo}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-meta"><span class="live-badge">${ch.youtubeId?'YT':'CANLI'}</span> <span class="ch-group">${getSmartGroup(ch.group)}</span></div>
        </div>
        <button class="fav-btn ${isFav ? "on" : ""}" onclick="event.stopPropagation(); toggleFavorite('${idKey.replace(/'/g, "\\'")}', this)">${isFav ? "★" : "☆"}</button>
      </div>`;
  }).join("");
}

const video = document.getElementById("video");
const ytPlayerWrap = document.getElementById("ytPlayerWrap");

function play(idx) {
  const ch = allChannels[idx];
  if (!ch) return;
  currentCh = ch;

  document.getElementById("playerIdle").style.display = "none";
  if (hls) { hls.destroy(); hls = null; }
  video.pause(); video.removeAttribute('src'); video.load(); video.style.display = "none";
  if (ytPlayerInstance?.destroy) { try { ytPlayerInstance.destroy(); } catch(e){} ytPlayerInstance = null; }
  ytPlayerWrap.style.display = "none";

  if (ch.youtubeId) {
    ytPlayerWrap.style.display = "block";
    const target = document.createElement("div"); target.id = "ytActual"; ytPlayerWrap.appendChild(target);
    ytPlayerInstance = new YT.Player('ytActual', {
      height: '100%', width: '100%', videoId: ch.youtubeId,
      playerVars: { 'autoplay': 1, 'playsinline': 1 },
      events: { 'onReady': (e) => e.target.playVideo(), 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) nextCh(); } }
    });
  } 
  else if (ch.url) {
    video.style.display = "block";
    if (Hls.isSupported()) {
      // 403 Hatasını Çözen Gelişmiş Hls Konfigürasyonu
      hls = new Hls({ 
        maxBufferLength: 10,
        xhrSetup: function(xhr, url) {
          // Eğer alt parça istekleri doğrudan gitmeye çalışırsa yakalayıp proxy'e yönlendiriyoruz
          if (!url.startsWith(PRIVATE_CLOUDFLARE_PROXY) && url.startsWith("http")) {
            const proxiedUrl = PRIVATE_CLOUDFLARE_PROXY + encodeURIComponent(url);
            xhr.open('GET', proxiedUrl, true);
          }
        }
      });
      hls.loadSource(PRIVATE_CLOUDFLARE_PROXY + encodeURIComponent(ch.url));
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    } else {
      video.src = PRIVATE_CLOUDFLARE_PROXY + encodeURIComponent(ch.url);
      video.play().catch(() => {});
    }
  }
  renderList();
  showToast("▶ " + ch.name);
}

video.addEventListener('ended', nextCh);

function stopPlayer() {
  if (hls) { hls.destroy(); hls = null; }
  video.pause(); video.removeAttribute('src'); video.load(); video.style.display = "none";
  if (ytPlayerInstance?.destroy) { try { ytPlayerInstance.destroy(); } catch(e){} ytPlayerInstance = null; }
  ytPlayerWrap.style.display = "none";
  document.getElementById("playerIdle").style.display = "flex";
  currentCh = null;
  renderList();
}

function getFiltered() {
  let list = allChannels;
  if (currentTab === "fav") list = list.filter(c => favorites.includes(c.url || c.youtubeId));
  if (currentCat)            list = list.filter(c => getSmartGroup(c.group) === currentCat);
  return list;
}

function nextCh() {
  const list = getFiltered(); if (!list.length) return;
  const idx = list.findIndex(c => (c.url && c.url === currentCh?.url) || (c.youtubeId && c.youtubeId === currentCh?.youtubeId));
  play(allChannels.indexOf(list[(idx + 1) % list.length]));
}

function prevCh() {
  const list = getFiltered(); if (!list.length) return;
  const idx = list.findIndex(c => (c.url && c.url === currentCh?.url) || (c.youtubeId && c.youtubeId === currentCh?.youtubeId));
  play(allChannels.indexOf(list[(idx - 1 + list.length) % list.length]));
}

function toggleFSSmart() {
  const el = document.getElementById("playerWrapContainer");
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen(); else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}

function toggleFavorite(idKey, btn) {
  if (favorites.includes(idKey)) {
    favorites = favorites.filter(u => u !== idKey);
    btn.textContent = "☆";
  } else {
    favorites.push(idKey);
    btn.textContent = "★";
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderList();
}

let toastT;
function showToast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove("show"), 2800);
}
</script>
</body>
</html>
