<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 ARAC TV PLAYER (DIRECT NATIVE) </title>
<script src="https://www.youtube.com/iframe_api"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080b10;
    --bg2:     #0e1318;
    --bg3:     #141a22;
    --border: rgba(255,255,255,0.06);
    --accent: #e8373d;
    --gold:   #f5c842;
    --text:   #e8eaf0;
    --muted:  #5a6478;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 185px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .sidebar-tabs {
    display: flex;
    padding: 0 6px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    background: none; border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 600;
    padding: 10px 2px;
    cursor: pointer;
  }

  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

  .ch-count {
    padding: 4px 8px 1px;
    font-size: 10px;
    color: var(--muted);
  }

  .channel-list {
    overflow-y: auto;
    flex: 1;
    padding: 3px 4px 56px; 
  }

  .channel {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px;
    border-radius: 6px;
    margin-bottom: 3px;
    cursor: pointer;
    background: rgba(255,255,255,0.02);
  }

  .channel.active {
    background: rgba(232,55,61,.15);
    border: 1.5px solid var(--accent);
  }

  .ch-logo {
    width: 24px; height: 24px;
    border-radius: 4px;
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    overflow: hidden;
  }

  .ch-logo img { width: 100%; height: 100%; object-fit: contain; }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name { font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-meta { display: flex; align-items: center; gap: 4px; margin-top: 1px; }
  .live-badge { background: var(--accent); color: #fff; font-size: 7px; font-weight: 700; padding: 1px 3px; border-radius: 2px; }
  .yt-badge { background: #ff0000; color: #fff; font-size: 7px; font-weight: 700; padding: 1px 3px; border-radius: 2px; }
  .ch-group { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .fav-btn { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; }
  .fav-btn.on { color: var(--gold); }

  .sidebar-ctrl {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    height: 52px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 6px;
  }

  .sidebar-ctrl .cb {
    flex: 1; height: 40px; margin: 0 2px;
    background: var(--bg3); border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    border-radius: 5px;
  }

  .main { display: flex; flex-direction: column; height: 100vh; background: #000; }
  .player-wrap { position: relative; background: #000; flex: 1; display: flex; flex-direction: column; }
  
  .player-ratio {
    position: relative; width: 100%; flex: 1; background: #000;
    display: flex; align-items: center; justify-content: center; padding-bottom: 30px; 
  }

  .player-idle {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #0d1520 0%, #000 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }

  .idle-txt { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 4px; color: var(--muted); }

  #video, .yt-container { width: 100%; height: 100%; background: #000; display: none; object-fit: fill; }
  .yt-container { position: absolute; inset: 0; border: none; padding-bottom: 30px; }

  .ctrl-bar {
    background: var(--bg2); border-top: 1px solid var(--border);
    position: fixed; bottom: 0; right: 0; left: 185px; height: 30px; 
    display: flex; align-items: center; padding: 0 8px; z-index: 9;
  }

  .cat-bar { display: flex; gap: 4px; overflow-x: auto; flex: 1; align-items: center; }
  .cat-bar::-webkit-scrollbar { display: none; }

  .cat-pill {
    background: #1c2530; border: 1px solid rgba(255, 255, 255, 0.18); color: #fff; 
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 3px; cursor: pointer; white-space: nowrap;
  }

  .cat-pill.active { background: #fff; color: #000; font-weight: 800; }

  /* Araç Ekranı Mod Seçici */
  .mode-selector {
    background: #1c2530; border: 1px solid var(--accent); color: var(--accent);
    font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; margin-left: 5px;
  }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { height: 50vh; }
    .player-ratio { height: 56.25vw; padding-bottom: 30px; }
    .ctrl-bar { left: 0; width: 100%; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('all', this)">KANALLAR</button>
      <button class="tab-btn" onclick="switchTab('fav', this)">⭐ FAVORİ</button>
    </div>
    <div class="ch-count" id="chCount"></div>
    <div class="channel-list" id="channelList">Yükleniyor...</div>

    <div class="sidebar-ctrl" id="actionButtons">
      <button class="cb" onclick="prevCh()">⏮</button>
      <button class="cb" onclick="nextCh()">⏭</button>
      <button class="cb" onclick="stopPlayer()">⏹</button>
      <button class="cb" onclick="toggleFS()">⛶</button>
    </div>
  </aside>

  <main class="main">
    <div class="player-wrap" id="playerWrapContainer">
      <div class="player-ratio">
        <div class="player-idle" id="playerIdle">
          <div class="idle-txt">İZLEMEK İÇİN KANAL SEÇİN</div>
        </div>
        <video id="video" controls playsinline autoplay></video>
        <div id="ytPlayerWrap" class="yt-container"></div>
      </div>
      <div class="ctrl-bar">
        <div class="cat-bar" id="catBar"></div>
        <select class="mode-selector" id="playModeSelector">
          <option value="direct" selected>🚗 Araç Modu (Doğrudan)</option>
          <option value="proxy">💻 PC Modu (Tünel)</option>
        </select>
      </div>
    </div>
  </main>
</div>

<script>
const PROXY_URL = "https://ancient-hall-8d94.deepbluee61.workers.dev/?url=";
const M3U_URLS = [
  "https://raw.githubusercontent.com/kadirsener1/avva/refs/heads/main/pplaylist.m3u",
  "https://raw.githubusercontent.com/tvizle61/tv/refs/heads/main/toplu.m3u",
  "https://raw.githubusercontent.com/tvizle61/plustv/refs/heads/main/ttv.m3u",
  "https://raw.githubusercontent.com/tvizle61/plustv/refs/heads/main/ttv1.m3u"
];

let ytPlayerInstance = null;
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let allChannels = [];
let currentCh = null;
let currentTab = "all";
let currentCat = "";
const uniqueKeys = new Set();

function onYouTubeIframeAPIReady() { console.log("YT Hazır"); }

const fetchPromises = M3U_URLS.map(url => fetch(url).then(r => r.ok ? r.text() : "").catch(() => ""));

Promise.all(fetchPromises).then(m3uResults => {
  m3uResults.forEach(text => {
    if (!text) return;
    const lines = text.split("\n");
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("#EXTINF")) {
        const name = lines[i].split(",")[1]?.trim() || "Kanal";
        const url = lines[i + 1]?.trim() || "";
        if (!url.startsWith("http") || uniqueKeys.has(url)) continue;
        
        const gm = lines[i].match(/group-title="([^"]*)"/i);
        const lm = lines[i].match(/tvg-logo="([^"]*)"/i);
        
        uniqueKeys.add(url);
        allChannels.push({
          name, url,
          group: gm ? gm[1].trim() : "Genel",
          logo: lm ? lm[1].trim() : ""
        });
      }
    }
  });

  allChannels.sort((a, b) => a.name.localeCompare(b.name, 'tr'));
  buildCats();
  renderList();
});

function buildCats() {
  const groups = ["", ...new Set(allChannels.map(c => c.group))];
  document.getElementById("catBar").innerHTML = groups.map((g, i) =>
    `<button class="cat-pill ${i===0?'active':''}" onclick="filterCat('${g}',this)">${i===0?'Tümü':g}</button>`
  ).join("");
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll(".cat-pill").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderList();
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderList();
}

function renderList() {
  let list = allChannels;
  if (currentTab === "fav") list = list.filter(c => favorites.includes(c.url || c.youtubeId));
  if (currentCat) list = list.filter(c => c.group === currentCat);

  document.getElementById("chCount").textContent = list.length + " Kanal";
  const el = document.getElementById("channelList");

  el.innerHTML = list.map(ch => {
    const idx = allChannels.indexOf(ch);
    const idKey = ch.url || ch.youtubeId;
    const isAct = currentCh && (currentCh.url === ch.url && currentCh.youtubeId === ch.youtubeId);
    const isFav = favorites.includes(idKey);
    return `
      <div class="channel ${isAct?'active':''}" onclick="play(${idx})">
        <div class="ch-logo">${ch.logo?`<img src="${ch.logo}">`:'📺'}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-meta"><span class="live-badge">${ch.youtubeId?'YT':'CANLI'}</span></div>
        </div>
        <button class="fav-btn ${isFav?'on':''}" onclick="event.stopPropagation(); toggleFav('${idKey}', this)">${isFav?'★':'☆'}</button>
      </div>`;
  }).join("");
}

const video = document.getElementById("video");
const ytPlayerWrap = document.getElementById("ytPlayerWrap");

function play(idx) {
  const ch = allChannels[idx];
  if (!ch) return;
  currentCh = ch;

  document.getElementById("playerIdle").style.display = "none";
  video.pause(); video.removeAttribute('src'); video.load(); video.style.display = "none";
  if (ytPlayerInstance?.destroy) { ytPlayerInstance.destroy(); ytPlayerInstance = null; }
  ytPlayerWrap.style.display = "none"; ytPlayerWrap.innerHTML = "";

  if (ch.youtubeId) {
    ytPlayerWrap.style.display = "block";
    const target = document.createElement("div"); target.id = "ytActual"; ytPlayerWrap.appendChild(target);
    ytPlayerInstance = new YT.Player('ytActual', {
      height:'100%', width:'100%', videoId: ch.youtubeId,
      playerVars: { 'autoplay': 1, 'playsinline': 1 },
      events: { 'onReady': (e) => e.target.playVideo() }
    });
  } else if (ch.url) {
    video.style.display = "block";
    
    // Seçilen moda göre URL yapısı belirleniyor
    const selectedMode = document.getElementById("playModeSelector").value;
    let finalUrl = ch.url;
    
    if (selectedMode === "proxy") {
      finalUrl = PROXY_URL + encodeURIComponent(ch.url);
    }

    // Araç ekranlarında CORS aşımı için doğrudan ham URL native video elementine basılıyor
    video.src = finalUrl;
    
    // Kullanıcı tıklaması (etkileşimi) ile doğrudan tetiklendiği için araç tarayıcısı oynatacaktır
    const playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.catch(error => {
        console.log("Oynatma başlatılamadı, araç tarayıcı kısıtlaması:", error);
      });
    }
  }
  renderList();
}

video.addEventListener('ended', () => nextCh());

function stopPlayer() {
  video.pause(); video.removeAttribute('src'); video.load(); video.style.display = "none";
  if (ytPlayerInstance?.destroy) { ytPlayerInstance.destroy(); ytPlayerInstance = null; }
  ytPlayerWrap.style.display = "none";
  document.getElementById("playerIdle").style.display = "flex";
  currentCh = null;
  renderList();
}

function getFiltered() {
  let list = allChannels;
  if (currentTab === "fav") list = list.filter(c => favorites.includes(c.url || c.youtubeId));
  if (currentCat) list = list.filter(c => c.group === currentCat);
  return list;
}

function nextCh() {
  const list = getFiltered(); if (!list.length) return;
  const idx = list.findIndex(c => (c.url && c.url === currentCh?.url) || (c.youtubeId && c.youtubeId === currentCh?.youtubeId));
  play(allChannels.indexOf(list[(idx + 1) % list.length]));
}

function prevCh() {
  const list = getFiltered(); if (!list.length) return;
  const idx = list.findIndex(c => (c.url && c.url === currentCh?.url) || (c.youtubeId && c.youtubeId === currentCh?.youtubeId));
  play(allChannels.indexOf(list[(idx - 1 + list.length) % list.length]));
}

function toggleFS() {
  const el = document.getElementById("playerWrapContainer");
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}

function toggleFav(idKey, btn) {
  if (favorites.includes(idKey)) {
    favorites = favorites.filter(u => u !== idKey);
    btn.textContent = "☆"; btn.classList.remove("on");
  } else {
    favorites.push(idKey);
    btn.textContent = "★"; btn.classList.add("on");
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderList();
}
</script>
</body>
</html>
