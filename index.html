<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📺 SENTV - IPTV</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#6c5ce7;--primary-dark:#5a4bd1;--bg-dark:#0a0a1a;--bg-card:#141428;--bg-sidebar:rgba(10,10,26,0.95);--bg-sidebar-transparent:rgba(10,10,26,0.75);--text:#e0e0e0;--text-dim:#8888aa;--accent:#00cec9;--danger:#ff6b6b;--success:#00b894;--border:rgba(108,92,231,0.3);--glow:rgba(108,92,231,0.5)}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-dark);color:var(--text);overflow:hidden;height:100vh;width:100vw}
        #loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;transition:opacity .5s}
        #loadingScreen.hide{opacity:0;pointer-events:none}
        .loader-logo{font-size:64px;margin-bottom:20px;animation:pulse 1.5s infinite}
        .loader-text{font-size:24px;color:var(--primary);margin-bottom:30px;font-weight:700}
        .loader-bar{width:200px;height:4px;background:var(--bg-card);border-radius:2px;overflow:hidden}
        .loader-bar-inner{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;animation:loadProgress 2s ease-in-out forwards}
        @keyframes loadProgress{0%{width:0%}50%{width:70%}100%{width:100%}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        #app{display:flex;height:100vh;width:100vw;position:relative}

        #categorySidebar{position:fixed;left:0;top:0;width:220px;height:100vh;background:var(--bg-sidebar);backdrop-filter:blur(20px);z-index:1001;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;border-right:1px solid var(--border);box-shadow:5px 0 30px rgba(0,0,0,.5)}
        #categorySidebar.hidden{transform:translateX(-100%);opacity:0}
        .cat-sidebar-header{padding:16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-height:60px;background:rgba(108,92,231,.1);flex-shrink:0}
        .cat-sidebar-header .logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .cat-sidebar-header .logo span{font-size:22px}
        .cat-list{flex:1;overflow-y:auto;padding:6px 8px;-webkit-overflow-scrolling:touch}
        .cat-list::-webkit-scrollbar{width:4px}
        .cat-list::-webkit-scrollbar-track{background:transparent}
        .cat-list::-webkit-scrollbar-thumb{background:var(--primary);border-radius:2px}
        .cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;cursor:pointer;transition:background .1s,border-color .1s;border:1px solid transparent;margin-bottom:2px;font-size:13px;color:var(--text)}
        .cat-item:hover{background:rgba(108,92,231,.15);border-color:var(--border)}
        .cat-item.active{background:linear-gradient(135deg,rgba(108,92,231,.3),rgba(0,206,201,.15));border-color:var(--primary);color:#fff}
        .cat-item.focused{background:rgba(0,206,201,.12);border-color:var(--accent);box-shadow:0 0 12px rgba(0,206,201,.25)}
        .cat-item.active.focused{background:linear-gradient(135deg,rgba(108,92,231,.35),rgba(0,206,201,.2));border-color:var(--accent)}
        .cat-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
        .cat-item-count{font-size:10px;background:rgba(255,255,255,.1);padding:2px 8px;border-radius:10px;color:var(--text-dim);flex-shrink:0;margin-left:8px}
        .cat-item.active .cat-item-count{background:rgba(255,255,255,.2);color:#fff}

        #sidebar{position:fixed;left:0;top:0;width:380px;height:100vh;background:var(--bg-sidebar);backdrop-filter:blur(20px);z-index:1000;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;border-right:1px solid var(--border);box-shadow:5px 0 30px rgba(0,0,0,.5)}
        #sidebar.hidden{transform:translateX(-100%);opacity:0}
        #sidebar.overlay-mode{background:var(--bg-sidebar-transparent)}
        .sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-height:65px;background:rgba(108,92,231,.1);flex-shrink:0}
        .sidebar-header .logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sidebar-header .logo span{font-size:28px}
        .header-actions{display:flex;gap:8px}
        .icon-btn{width:36px;height:36px;border:1px solid var(--border);background:rgba(108,92,231,.15);color:var(--text);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
        .icon-btn:hover,.icon-btn:focus{background:var(--primary);color:#fff;border-color:var(--primary);outline:none}
        .sidebar-cat-label{padding:8px 20px;font-size:12px;color:var(--accent);border-bottom:1px solid rgba(0,206,201,.15);flex-shrink:0;font-weight:700;display:flex;align-items:center;gap:8px;background:rgba(0,206,201,.05)}
        .sidebar-cat-label .back-hint{font-size:10px;color:var(--text-dim);font-weight:400;margin-left:auto}
        .channel-list-wrapper{flex:1;overflow:hidden;display:flex;flex-direction:column}
        .channel-count{padding:8px 20px;font-size:12px;color:var(--text-dim);border-bottom:1px solid rgba(255,255,255,.03);flex-shrink:0}
        .channel-list{flex:1;overflow-y:auto;padding:6px 10px;-webkit-overflow-scrolling:touch}
        .channel-list::-webkit-scrollbar{width:4px}
        .channel-list::-webkit-scrollbar-track{background:transparent}
        .channel-list::-webkit-scrollbar-thumb{background:var(--primary);border-radius:2px}
        .channel-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;cursor:pointer;transition:background .1s,border-color .1s;border:1px solid transparent;margin-bottom:2px}
        .channel-item:hover{background:rgba(108,92,231,.15);border-color:var(--border)}
        .channel-item.active{background:linear-gradient(135deg,rgba(108,92,231,.3),rgba(0,206,201,.15));border-color:var(--primary);box-shadow:0 0 20px rgba(108,92,231,.2)}
        .channel-item.focused{background:rgba(0,206,201,.12);border-color:var(--accent);box-shadow:0 0 12px rgba(0,206,201,.25)}
        .channel-item.active.focused{background:linear-gradient(135deg,rgba(108,92,231,.35),rgba(0,206,201,.2));border-color:var(--accent)}
        .channel-logo{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:20px}
        .channel-logo img{width:100%;height:100%;object-fit:contain}
        .channel-info{flex:1;min-width:0}
        .channel-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .channel-group{font-size:11px;color:var(--text-dim);margin-top:2px}
        .channel-num{font-size:11px;color:var(--text-dim);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:6px;font-weight:600}
        #playerArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;position:relative;width:100%;height:100vh}
        #videoContainer{width:100%;height:100%;position:relative;background:#000}
        #videoPlayer{width:100%;height:100%;background:transparent;object-fit:contain;transform:translateZ(0);-webkit-transform:translateZ(0);position:relative;z-index:2}

        #videoBg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;background-color:#000;background-image:url('https://raw.githubusercontent.com/kadirsener1/tvmyeni/refs/heads/main/bg.JPG');background-size:cover;background-position:center;background-repeat:no-repeat;transition:opacity .4s ease}
        #videoBg.playing{opacity:0;pointer-events:none}

        #welcomeScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);z-index:5}
        .welcome-icon{font-size:80px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .welcome-title{font-size:28px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .welcome-subtitle{color:var(--text-dim);font-size:16px}
        .welcome-keys{margin-top:30px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:650px;padding:0 20px}
        .key-hint{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px}
        .key-badge{background:rgba(108,92,231,.2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:12px;color:var(--primary);font-weight:600}

        #channelInfoBar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent 0%,rgba(0,0,0,.85) 30%,rgba(0,0,0,.95) 100%);padding:40px 30px 24px 30px;z-index:100;display:none;animation:infoBarSlideUp .35s ease}
        @keyframes infoBarSlideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        .info-bar-content{display:flex;align-items:center;justify-content:space-between;gap:20px}
        .info-bar-left{display:flex;align-items:center;gap:16px;flex:1;min-width:0}
        .info-bar-number{font-size:32px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums;flex-shrink:0}
        .info-bar-details{flex:1;min-width:0}
        .info-bar-name{font-size:22px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .info-bar-group{font-size:13px;color:var(--accent);margin-top:2px}
        .info-bar-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
        .info-bar-resolution{display:flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(108,92,231,.25);border:1px solid rgba(108,92,231,.4);border-radius:8px;font-size:13px;color:var(--primary);font-weight:700}
        .info-bar-resolution .res-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:blink 1.5s infinite}
        .info-bar-live{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,107,107,.2);border:1px solid rgba(255,107,107,.3);border-radius:8px;font-size:12px;color:var(--danger);font-weight:700}
        .info-bar-live .live-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);animation:blink 1s infinite}

        #playerControls{position:absolute;bottom:0;left:0;width:100%;padding:20px 30px;background:linear-gradient(transparent,rgba(0,0,0,.9));display:flex;align-items:center;justify-content:space-between;z-index:90;opacity:0;transition:opacity .3s}
        #playerControls.visible{opacity:1}
        .controls-left,.controls-right{display:flex;align-items:center;gap:12px}
        .ctrl-btn{width:42px;height:42px;border:none;background:rgba(255,255,255,.1);color:#fff;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
        .ctrl-btn:hover{background:var(--primary);transform:scale(1.1)}
        .volume-slider{width:80px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.2);border-radius:2px;outline:none;cursor:pointer}
        .volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--primary);border-radius:50%;cursor:pointer}
        .now-playing-info{display:flex;align-items:center;gap:10px;flex:1;justify-content:center}
        .now-playing-dot{width:8px;height:8px;background:var(--danger);border-radius:50%;animation:blink 1.5s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .now-playing-text{font-size:14px;font-weight:600}
        .now-playing-res{font-size:11px;color:var(--accent);font-weight:600;margin-left:4px}

        #toast{position:fixed;top:30px;right:30px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;z-index:9999;display:none;animation:toastSlideDown .3s ease;box-shadow:0 10px 30px rgba(0,0,0,.3);max-width:300px}
        @keyframes toastSlideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .toast-content{display:flex;align-items:center;gap:10px;font-size:14px}
        #bufferingSpinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;display:none}
        .spinner{width:50px;height:50px;border:3px solid rgba(108,92,231,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #numberOverlay{position:absolute;top:30px;right:30px;background:rgba(10,10,26,.9);backdrop-filter:blur(15px);padding:16px 24px;border-radius:14px;border:1px solid var(--border);z-index:200;display:none;text-align:center}
        .number-display{font-size:48px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums}
        .number-hint{font-size:12px;color:var(--text-dim);margin-top:4px}
        #mobileMenuBtn{display:none;position:fixed;top:15px;left:15px;z-index:900;width:44px;height:44px;border-radius:12px;background:rgba(10,10,26,.9);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(10px)}

        #debugPanel{position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,.9);color:#0f0;font-family:monospace;font-size:10px;padding:8px;border-radius:6px;z-index:99999;max-width:300px;max-height:200px;overflow-y:auto;display:none;word-wrap:break-word;line-height:1.4}
        #debugPanel.visible{display:block}

        @media(max-width:768px){
            #categorySidebar{width:100%}
            #sidebar{width:100%;border-right:none}
            #mobileMenuBtn{display:flex}
            .sidebar-header{padding:12px 16px;min-height:56px}
            .sidebar-header .logo{font-size:18px}
            .sidebar-header .logo span{font-size:24px}
            .cat-sidebar-header{padding:12px 14px;min-height:52px}
            .cat-sidebar-header .logo{font-size:16px}
            .cat-sidebar-header .logo span{font-size:20px}
            .cat-item{padding:9px 12px;font-size:12px}
            .channel-list{padding:4px 6px}
            .channel-item{padding:8px 10px;gap:10px}
            .channel-logo{width:36px;height:36px;font-size:16px}
            .channel-name{font-size:13px}
            .channel-group{font-size:10px}
            .channel-num{font-size:10px;padding:2px 6px}
            .channel-count{padding:6px 12px;font-size:11px}
            .sidebar-cat-label{padding:6px 12px;font-size:11px}
            #channelInfoBar{padding:20px 14px 16px 14px;bottom:0}
            .info-bar-content{flex-direction:column;align-items:flex-start;gap:6px}
            .info-bar-left{gap:10px;width:100%}
            .info-bar-number{font-size:22px}
            .info-bar-name{font-size:16px}
            .info-bar-group{font-size:11px}
            .info-bar-right{width:100%;justify-content:flex-start;gap:8px}
            .info-bar-resolution{font-size:11px;padding:3px 10px}
            .info-bar-live{font-size:10px;padding:3px 8px}
            #playerControls{padding:12px 16px;flex-wrap:wrap;gap:8px}
            .controls-left{gap:8px}
            .controls-right{gap:8px}
            .ctrl-btn{width:36px;height:36px;font-size:15px}
            .volume-slider{width:60px}
            .now-playing-text{font-size:12px}
            .now-playing-res{font-size:10px}
            .welcome-icon{font-size:50px;margin-bottom:14px}
            .welcome-title{font-size:20px}
            .welcome-subtitle{font-size:13px;padding:0 20px;text-align:center}
            .welcome-keys{gap:10px;margin-top:20px}
            .key-hint{font-size:11px}
            .key-badge{padding:3px 8px;font-size:10px}
            #numberOverlay{top:15px;right:15px;padding:12px 18px}
            .number-display{font-size:36px}
            #toast{top:15px;right:15px;left:15px;max-width:none;padding:10px 16px}
            .toast-content{font-size:13px}
        }
        @media(max-width:480px){
            .sidebar-header{padding:10px 12px;min-height:50px}
            .sidebar-header .logo{font-size:16px}
            .sidebar-header .logo span{font-size:20px}
            .channel-logo{width:32px;height:32px;font-size:14px;border-radius:8px}
            .channel-item{padding:7px 8px;gap:8px;border-radius:10px}
            .channel-name{font-size:12px}
            .channel-num{font-size:9px;padding:1px 5px}
            .cat-item{padding:7px 10px;font-size:11px;border-radius:8px}
            .cat-item-count{font-size:9px;padding:1px 6px}
            .ctrl-btn{width:32px;height:32px;font-size:13px}
            .volume-slider{width:50px}
            #channelInfoBar{padding:16px 10px 14px 10px}
            .info-bar-number{font-size:18px}
            .info-bar-name{font-size:14px}
            .info-bar-left{gap:8px}
            .info-bar-resolution{font-size:10px;padding:2px 8px}
            .info-bar-resolution .res-dot{width:6px;height:6px}
            .info-bar-live{font-size:9px;padding:2px 6px}
            .info-bar-live .live-dot{width:6px;height:6px}
        }
        @media(max-height:500px)and(orientation:landscape){
            #categorySidebar{width:180px}
            #sidebar{width:300px}
            .sidebar-header{min-height:44px;padding:8px 12px}
            .cat-sidebar-header{min-height:40px;padding:8px 10px}
            .channel-item{padding:6px 10px}
            .channel-logo{width:32px;height:32px}
            .cat-item{padding:6px 10px;font-size:11px}
            .channel-count{padding:4px 12px;font-size:10px}
            #channelInfoBar{padding:15px 16px 10px 16px}
            .info-bar-name{font-size:16px}
            .info-bar-number{font-size:22px}
        }
        @media(pointer:coarse){
            .channel-item{min-height:54px}
            .cat-item{min-height:44px}
            .ctrl-btn{min-width:44px;min-height:44px}
            .icon-btn{min-width:40px;min-height:40px}
        }
        @supports(padding-bottom:env(safe-area-inset-bottom)){
            #channelInfoBar{padding-bottom:calc(16px + env(safe-area-inset-bottom))}
            #playerControls{padding-bottom:calc(20px + env(safe-area-inset-bottom))}
        }
    </style>
</head>
<body>
<div id="loadingScreen">
    <div class="loader-logo">📺</div>
    <div class="loader-text">SENTV</div>
    <div class="loader-bar"><div class="loader-bar-inner"></div></div>
</div>
<div id="toast"><div class="toast-content" id="toastContent"></div></div>
<div id="debugPanel"></div>
<button id="mobileMenuBtn" onclick="toggleSidebar()">☰</button>
<div id="app">
    <div id="categorySidebar" class="hidden">
        <div class="cat-sidebar-header">
            <div class="logo"><span>📂</span> Kategoriler</div>
            <div class="header-actions"><button class="icon-btn" onclick="hideCategorySidebar()" title="Kapat">✕</button></div>
        </div>
        <div class="cat-list" id="catList"></div>
    </div>

    <div id="sidebar" class="hidden">
        <div class="sidebar-header">
            <div class="logo"><span>📺</span> SENTV</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="showCategorySidebar()" title="Kategoriler">📂</button>
                <button class="icon-btn" onclick="hideSidebar()" title="Kapat">✕</button>
            </div>
        </div>
        <div class="sidebar-cat-label" id="sidebarCatLabel">📂 Tümü <span class="back-hint">◄ Kategoriler</span></div>
        <div class="channel-list-wrapper">
            <div class="channel-count" id="channelCount">0 kanal</div>
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <div id="playerArea">
        <div id="videoContainer">
            <div id="videoBg"></div>
            <video id="videoPlayer" playsinline webkit-playsinline preload="auto" x-webkit-airplay="allow" crossorigin="anonymous"></video>
            <div id="welcomeScreen">
                <div class="welcome-icon">📺</div>
                <div class="welcome-title">SENTV</div>
                <div class="welcome-subtitle">Bir kanal seçerek izlemeye başlayın</div>
                <div class="welcome-keys">
                    <div class="key-hint"><span class="key-badge">OK</span> Kanal listesi</div>
                    <div class="key-hint"><span class="key-badge">◄</span> Kategoriler</div>
                    <div class="key-hint"><span class="key-badge">▲▼</span> Kanal değiştir</div>
                    <div class="key-hint"><span class="key-badge">CH+/-</span> Kanal değiştir</div>
                    <div class="key-hint"><span class="key-badge">0-9</span> Kanal no</div>
                </div>
            </div>
            <div id="bufferingSpinner"><div class="spinner"></div></div>
            <div id="channelInfoBar">
                <div class="info-bar-content">
                    <div class="info-bar-left">
                        <div class="info-bar-number" id="infoBarNumber"></div>
                        <div class="info-bar-details">
                            <div class="info-bar-name" id="infoBarName"></div>
                            <div class="info-bar-group" id="infoBarGroup"></div>
                        </div>
                    </div>
                    <div class="info-bar-right">
                        <div class="info-bar-resolution" id="infoBarRes" style="display:none"><div class="res-dot"></div><span id="infoBarResText"></span></div>
                        <div class="info-bar-live"><div class="live-dot"></div>CANLI</div>
                    </div>
                </div>
            </div>
            <div id="numberOverlay"><div class="number-display" id="numberDisplay"></div><div class="number-hint">Kanal numarası</div></div>
            <div id="playerControls">
                <div class="controls-left">

</div>

async function loadM3U(url){
    try{const r=await fetch(url);if(!r.ok)throw 0;channels=parseM3U(await r.text());debugLog('M3U loaded direct: '+channels.length+' ch');}
    catch(e){
        for(let i=0;i<CORS_PROXIES.length;i++){
            try{const r=await fetch(CORS_PROXIES[i]+encodeURIComponent(url));if(r.ok){channels=parseM3U(await r.text());debugLog('M3U loaded proxy['+i+']: '+channels.length+' ch');break;}}catch(e2){}
        }
        if(!channels.length){showToast('❌','M3U yüklenemedi');debugLog('M3U FAIL');return;}
    }
    channels.forEach((c,i)=>{c.index=i;c.number=i+1;});
    extractCategories();filterChannels();forceRebuildList();
    showToast('✅',`${channels.length} kanal yüklendi`);
}

function parseM3U(t){
    const lines=t.split('\n'),p=[];let c=null;
    for(let i=0;i<lines.length;i++){const l=lines[i].trim();
        if(l.startsWith('#EXTINF:')){c={};const nm=l.match(/tvg-name="([^"]*)"/),lg=l.match(/tvg-logo="([^"]*)"/),gr=l.match(/group-title="([^"]*)"/),tl=l.match(/,(.+)$/);c.name=nm?nm[1]:(tl?tl[1].trim():'Bilinmeyen');c.logo=lg?lg[1]:'';c.group=gr?gr[1]:'Diğer';if(!c.name&&tl)c.name=tl[1].trim();}
        else if(l&&!l.startsWith('#')&&c){c.url=l;if(c.name&&c.url)p.push(c);c=null;}}
    return p;
}

function extractCategories(){
    const s=new Set();channels.forEach(c=>{if(c.group)s.add(c.group);});

            <span class="cat-item-name">${cat}</span>
            <span class="cat-item-count">${cnt}</span>

}

    focusedCategoryIndex=allCategoryNames.indexOf(cat);

function updateCatLabel(){

function filterChannels(){filteredChannels=channels.filter(c=>currentCategory==='all'||c.group===currentCategory);document.getElementById('channelCount').textContent=`${filteredChannels.length} kanal`;}
function getListHash(){return currentCategory+'|'+filteredChannels.length+'|'+currentChannelIndex;}
function forceRebuildList(){document.getElementById('channelList').dataset.listHash='';renderChannelList();}
function renderChannelList(){
    const container=document.getElementById('channelList');

    const hash=getListHash();
    if(container.dataset.listHash!==hash){let h='';
        filteredChannels.forEach((ch,i)=>{const isA=currentChannelIndex===ch.index,isF=focusedChannelIndex===i&&sidebarVisible&&focusMode==='channels';const logo=ch.logo?`<img src="${ch.logo}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='📺'">`:'📺';
            h+=`<div class="channel-item${isA?' active':''}${isF?' focused':''}" data-idx="${i}" onclick="playChannel(${i})" id="ch-${i}"><div class="channel-num">${ch.number}</div><div class="channel-logo">${logo}</div><div class="channel-info"><div class="channel-name">${ch.name}</div><div class="channel-group">${ch.group||''}</div></div></div>`;});
        container.innerHTML=h;container.dataset.listHash=hash;}else updateFocusUI();
}
function updateFocusUI(){
    const container=document.getElementById('channelList'),items=container.children;
    for(let i=0;i<items.length;i++){const el=items[i];if(!el.dataset||el.dataset.idx===undefined)continue;const idx=parseInt(el.dataset.idx),ch=filteredChannels[idx];if(!ch)continue;
        const wA=currentChannelIndex===ch.index,wF=idx===focusedChannelIndex&&sidebarVisible&&focusMode==='channels';
        if(el.classList.contains('active')!==wA)el.classList.toggle('active',wA);if(el.classList.contains('focused')!==wF)el.classList.toggle('focused',wF);}
    if(focusMode==='channels'&&sidebarVisible){const fe=document.getElementById(`ch-${focusedChannelIndex}`);if(fe){const lE=container,eT=fe.offsetTop-lE.offsetTop,eH=fe.offsetHeight,lH=lE.clientHeight,sT=lE.scrollTop;if(eT<sT)lE.scrollTop=eT;else if(eT+eH>sT+lH)lE.scrollTop=eT+eH-lH;}}
}
function getResLabel(w,h){if(h>=2160||w>=3840)return'4K UHD';if(h>=1440||w>=2560)return'1440p QHD';if(h>=1080||w>=1920)return'1080p FHD';if(h>=720||w>=1280)return'720p HD';if(h>=576)return'576p SD';if(h>=480)return'480p SD';if(h>=360)return'360p';if(h>0)return h+'p';return'';}
function updateResDisplay(txt){currentResolution=txt;const el=document.getElementById('infoBarRes'),et=document.getElementById('infoBarResText');if(txt){et.textContent=txt;el.style.display='flex';}else{el.style.display='none';}document.getElementById('nowPlayingRes').textContent=txt?`• ${txt}`:'';}
function startResMonitor(){if(resolutionChecker)clearInterval(resolutionChecker);const v=document.getElementById('videoPlayer');currentResolution='';updateResDisplay('');resolutionChecker=setInterval(()=>{if(v.videoWidth>0&&v.videoHeight>0){const w=v.videoWidth,h=v.videoHeight,l=getResLabel(w,h),nr=`${w}×${h} ${l}`;if(nr!==currentResolution)updateResDisplay(nr);}},2000);}

// ==========================================
// STREAM FORMAT TESPİTİ
// ==========================================
function detectStreamType(url) {
    const u = url.toLowerCase();
    if (u.includes('.mpd') || u.includes('manifest.mpd') || u.includes('/dash/')) return 'dash';
    if (u.includes('.flv') || u.endsWith('.flv')) return 'flv';
    if (u.includes('.ts') && !u.includes('.m3u')) return 'ts';
    if (u.includes('.mp4') && !u.includes('.m3u')) return 'mp4';
    if (u.includes('.m3u8') || u.includes('m3u8') || u.includes('/hls/') ||
        u.includes('/live/') || u.includes('/playlist') || u.includes('token=') ||
        u.includes('vavoo') || u.includes('/play/') || u.includes('.m3u')) return 'hls';
    // Default to HLS for unknown IPTV streams
    return 'hls';
}

// ==========================================
// TÜM PLAYER INSTANCE TEMİZLEME
// ==========================================
function destroyAllPlayers() {
    if (hlsInstance) {
        try { hlsInstance.destroy(); } catch(e){}
        hlsInstance = null;
    }
    if (dashInstance) {
        try { dashInstance.reset(); } catch(e){}
        dashInstance = null;
    }
    if (mpegtsInstance) {
        try { mpegtsInstance.unload(); mpegtsInstance.detachMediaElement(); mpegtsInstance.destroy(); } catch(e){}
        mpegtsInstance = null;
    }
    if (stallChecker) { clearInterval(stallChecker); stallChecker = null; }
    if (resolutionChecker) { clearInterval(resolutionChecker); resolutionChecker = null; }
    cleanupBlobUrls();
}

// ==========================================
// VIDEO ELEMENT SIFIRLAMA
// ==========================================
function resetVideoElement() {
    const video = document.getElementById('videoPlayer');
    video.pause();
    video.removeAttribute('src');
    video.innerHTML = '';
    // crossorigin ayarını kaldır - bazı streamlerde sorun çıkarıyor
    video.removeAttribute('crossorigin');
    video.load();

}

// ==========================================
// ANA PLAY FONKSİYONU - Geliştirilmiş
// ==========================================
async function playChannel(fi) {
    const ch = filteredChannels[fi];
    if (!ch) return;

    if (ch.url === currentPlayingUrl) {
        hideAllSidebars();
        showChannelInfoBar(ch);
        return;
    }

    currentChannelIndex = ch.index;
    focusedChannelIndex = fi;
    currentPlayingUrl = ch.url;
    currentRetryCount = 0;

    debugLog('═══════════════════════════════');
    debugLog('Playing: ' + ch.name);
    debugLog('URL: ' + ch.url.substring(0, 120));

    destroyAllPlayers();
    const video = resetVideoElement();
    updateResDisplay('');

    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('bufferingSpinner').style.display = 'block';
    showBg();

    const streamType = detectStreamType(ch.url);
    debugLog('Stream type: ' + streamType);

    await executePlayStrategy(video, ch.url, ch, streamType, 0);

    startResMonitor();
    document.getElementById('nowPlayingText').textContent = ch.name;
    showChannelInfoBar(ch);
    forceRebuildList();
    setTimeout(() => hideAllSidebars(), 400);
    showToast('▶️', ch.name);
}

// ==========================================
// PLAY STRATEGY ZİNCİRİ
// Strategy 0: HLS.js / dash.js / mpegts.js (birincil)
// Strategy 1: HLS.js with CORS proxy
// Strategy 2: Native player (crossorigin=anonymous)
// Strategy 3: Native player (crossorigin kaldırılmış)
// Strategy 4: Native with CORS proxy
// ==========================================
async function executePlayStrategy(video, url, ch, streamType, strategyIndex) {
    debugLog('Strategy #' + strategyIndex + ' for type=' + streamType);

    switch(strategyIndex) {
        case 0: // Birincil: Library ile oynat
            if (streamType === 'dash' && platformInfo.dashJsAvailable) {
                playWithDashJs(video, url, ch, strategyIndex);
            } else if ((streamType === 'flv' || streamType === 'ts') && platformInfo.mpegtsAvailable) {
                playWithMpegts(video, url, ch, streamType, strategyIndex);
            } else if (streamType === 'hls' && platformInfo.hlsJsSupported) {
                playWithHlsJs(video, url, ch, strategyIndex);
            } else if (streamType === 'hls' && platformInfo.hasNativeHLS) {
                // iOS/Safari - direkt native dene
                playNative(video, url, ch, true, strategyIndex);
            } else if (streamType === 'mp4') {
                playNative(video, url, ch, false, strategyIndex);
            } else {
                // Hiç library yok, native dene
                playNative(video, url, ch, streamType === 'hls', strategyIndex);
            }
            break;

        case 1: // HLS.js + CORS Proxy
            if (platformInfo.hlsJsSupported && streamType === 'hls') {
                const proxyUrl = CORS_PROXIES[0] + encodeURIComponent(url);
                debugLog('Trying CORS proxy: ' + CORS_PROXIES[0].substring(0, 30));
                destroyAllPlayers();
                video = resetVideoElement();
                playWithHlsJs(video, proxyUrl, ch, strategyIndex);
            } else {
                executePlayStrategy(video, url, ch, streamType, strategyIndex + 1);
            }
            break;

        case 2: // Native with crossorigin
            debugLog('Native with crossorigin=anonymous');
            destroyAllPlayers();
            video = resetVideoElement();
            video.setAttribute('crossorigin', 'anonymous');
            playNative(video, url, ch, streamType === 'hls', strategyIndex);
            break;

        case 3: // Native without crossorigin
            debugLog('Native without crossorigin');
            destroyAllPlayers();
            video = resetVideoElement();
            video.removeAttribute('crossorigin');
            playNative(video, url, ch, streamType === 'hls', strategyIndex);
            break;

        case 4: // Native + CORS Proxy
            debugLog('Native + CORS proxy');
            destroyAllPlayers();
            video = resetVideoElement();
            video.removeAttribute('crossorigin');
            const proxiedUrl = CORS_PROXIES[0] + encodeURIComponent(url);
            playNative(video, proxiedUrl, ch, streamType === 'hls', strategyIndex);
            break;

        default:
            debugLog('All strategies exhausted');
            document.getElementById('bufferingSpinner').style.display = 'none';
            showToast('❌', 'Bu kanal oynatılamıyor');
            showBg();
            currentPlayingUrl = '';
            break;
    }
}

function nextStrategy(video, originalUrl, ch, currentStrategy) {
    const streamType = detectStreamType(originalUrl);
    // originalUrl'yi her zaman kullan (proxy eklenmiş olanı değil)
    const cleanUrl = originalUrl.includes('allorigins.win') || originalUrl.includes('corsproxy.io') || originalUrl.includes('codetabs.com')
        ? decodeURIComponent(originalUrl.split('?url=')[1] || originalUrl.split('?quest=')[1] || originalUrl.split('/?')[1] || originalUrl)
        : originalUrl;
    executePlayStrategy(video, cleanUrl, ch, streamType, currentStrategy + 1);
}

// ==========================================
// HLS.js PLAYER - Ultra dayanıklı yapılandırma
// ==========================================
function playWithHlsJs(video, url, ch, strategyIndex) {
    debugLog('HLS.js loading: ' + url.substring(0, 80));

    const hlsConfig = {
        // Buffer ayarları
        maxBufferLength: 30,
        maxMaxBufferLength: 120,
        maxBufferSize: 120 * 1000 * 1000,
        maxBufferHole: 1.5,
        backBufferLength: 30,

        // Timeout ayarları - çok cömert
        manifestLoadingTimeOut: 30000,
        manifestLoadingMaxRetry: 4,
        manifestLoadingRetryDelay: 1500,
        manifestLoadingMaxRetryTimeout: 30000,

        levelLoadingTimeOut: 30000,
        levelLoadingMaxRetry: 4,
        levelLoadingRetryDelay: 1500,
        levelLoadingMaxRetryTimeout: 30000,

        fragLoadingTimeOut: 60000,
        fragLoadingMaxRetry: 6,
        fragLoadingRetryDelay: 1000,
        fragLoadingMaxRetryTimeout: 60000,

        // Worker & Performance
        enableWorker: true,
        lowLatencyMode: false,
        startFragPrefetch: true,
        progressive: true,

        // ABR ayarları
        testBandwidth: true,
        abrEwmaDefaultEstimate: 500000,
        abrBandWidthFactor: 0.95,
        abrBandWidthUpFactor: 0.7,
        abrMaxWithRealBitrate: true,
        capLevelToPlayerSize: false,

        // Canlı yayın ayarları
        liveSyncDurationCount: 3,
        liveMaxLatencyDurationCount: 10,
        liveDurationInfinity: true,
        liveBackBufferLength: 30,

        // Hata toleransı
        nudgeOffset: 0.3,
        nudgeMaxRetry: 10,
        startPosition: -1,
        stretchShortVideoTrack: true,
        forceKeyFrameOnDiscontinuity: true,
        appendErrorMaxRetry: 5,
        highBufferWatchdogPeriod: 3,

        // XHR ayarları - CORS bypass
        xhrSetup: function(xhr, xhrUrl) {
            xhr.timeout = 60000;
            xhr.withCredentials = false;
        },

        // Özel header gerektiğinde
        fetchSetup: function(context, initParams) {
            initParams.mode = 'cors';
            initParams.credentials = 'omit';
            return new Request(context.url, initParams);
        }
    };

    hlsInstance = new Hls(hlsConfig);

    let manifestLoaded = false;
    let fatalErrorCount = 0;
    let playStarted = false;

    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
        manifestLoaded = true;
        debugLog('HLS manifest parsed, levels=' + data.levels.length + ' audio=' + data.audioTracks.length);

        // En iyi kaliteyi seç
        if (data.levels.length > 1) {
            hlsInstance.currentLevel = -1; // Auto
        }

        attemptPlay(video, ch, strategyIndex);
    });

    hlsInstance.on(Hls.Events.MANIFEST_LOADED, function(event, data) {
        debugLog('HLS manifest loaded, url=' + (data.url || '').substring(0, 60));
    });

    hlsInstance.on(Hls.Events.LEVEL_LOADED, function(event, data) {
        if (!manifestLoaded) return;
        debugLog('Level loaded, live=' + data.details.live + ' dur=' + Math.round(data.details.totalduration || 0));
    });

    hlsInstance.on(Hls.Events.FRAG_LOADED, function() {
        if (!playStarted) {
            playStarted = true;
            debugLog('First fragment loaded');
        }
    });

    hlsInstance.on(Hls.Events.FRAG_BUFFERED, function() {
        document.getElementById('bufferingSpinner').style.display = 'none';
    });

    hlsInstance.on(Hls.Events.ERROR, function(event, data) {
        debugLog('HLS error: ' + data.type + '/' + data.details + ' fatal=' + data.fatal + ' resp=' + (data.response ? data.response.code : 'n/a'));

        if (data.fatal) {
            fatalErrorCount++;

            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                if (fatalErrorCount <= 3) {
                    debugLog('Network error recovery attempt ' + fatalErrorCount);
                    showToast('🔄', 'Bağlantı yeniden deneniyor...');
                    setTimeout(() => {
                        if (hlsInstance) {
                            try { hlsInstance.startLoad(); } catch(e){}
                        }
                    }, 1500 * fatalErrorCount);
                } else {
                    debugLog('HLS.js network failed, trying next strategy');
                    destroyAllPlayers();
                    nextStrategy(video, ch.url, ch, strategyIndex);
                }
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                if (fatalErrorCount <= 2) {
                    debugLog('Media error recovery attempt ' + fatalErrorCount);
                    try { hlsInstance.recoverMediaError(); } catch(e){}
                } else if (fatalErrorCount <= 4) {
                    debugLog('Swap audio codec recovery');
                    try { hlsInstance.swapAudioCodec(); hlsInstance.recoverMediaError(); } catch(e){}
                } else {
                    debugLog('HLS.js media failed, trying next strategy');
                    destroyAllPlayers();
                    nextStrategy(video, ch.url, ch, strategyIndex);
                }
            } else {
                debugLog('HLS.js other fatal error, trying next strategy');
                destroyAllPlayers();
                nextStrategy(video, ch.url, ch, strategyIndex);
            }
        }

        // Non-fatal error handling
        if (!data.fatal) {
            if (data.details === 'bufferStalledError' && video.currentTime > 0) {
                video.currentTime += 0.3;
            }
        }
    });

    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);

    // Manifest yüklenme timeout
    setTimeout(() => {
        if (!manifestLoaded && hlsInstance) {
            debugLog('HLS manifest timeout, trying next strategy');
            destroyAllPlayers();
            nextStrategy(video, ch.url, ch, strategyIndex);
        }
    }, 35000);

    setupVideoEvents(video, ch, strategyIndex);
    setupStallChecker(video, ch, strategyIndex);
}

// ==========================================
// DASH.JS PLAYER
// ==========================================
function playWithDashJs(video, url, ch, strategyIndex) {
    debugLog('dash.js loading: ' + url.substring(0, 80));

    dashInstance = dashjs.MediaPlayer().create();
    dashInstance.updateSettings({
        streaming: {
            delay: { liveDelay: 3 },
            liveCatchup: { enabled: true, mode: 'liveCatchupModeLoLP' },
            buffer: {
                bufferTimeAtTopQuality: 30,
                bufferTimeAtTopQualityLongForm: 60,
                stallThreshold: 0.5,
                bufferToKeep: 20,
                bufferAheadToKeep: 40
            },
            abr: { autoSwitchBitrate: { audio: true, video: true } },
            retryAttempts: { MPD: 5, MediaSegment: 5, InitializationSegment: 5 },
            retryIntervals: { MPD: 2000, MediaSegment: 2000, InitializationSegment: 2000 }
        }
    });

    dashInstance.initialize(video, url, true);

    dashInstance.on('error', function(e) {
        debugLog('dash.js error: ' + JSON.stringify(e).substring(0, 100));
        destroyAllPlayers();
        nextStrategy(video, ch.url, ch, strategyIndex);
    });

    dashInstance.on('playbackStarted', function() {
        debugLog('dash.js playback started');
        document.getElementById('bufferingSpinner').style.display = 'none';
        hideBg();
        isPlaying = true;
    });

    setupVideoEvents(video, ch, strategyIndex);
    setupStallChecker(video, ch, strategyIndex);
}

// ==========================================
// MPEGTS.JS PLAYER (FLV/TS)
// ==========================================
function playWithMpegts(video, url, ch, type, strategyIndex) {
    debugLog('mpegts.js loading (' + type + '): ' + url.substring(0, 80));

    const config = {
        type: type === 'flv' ? 'flv' : 'mpegts',
        isLive: true,
        url: url
    };

    mpegtsInstance = mpegts.createPlayer(config, {
        enableWorker: true,
        enableStashBuffer: true,
        stashInitialSize: 384 * 1024,
        lazyLoadMaxDuration: 180,
        seekType: 'range',
        autoCleanupSourceBuffer: true,
        autoCleanupMaxBackwardDuration: 120,
        autoCleanupMinBackwardDuration: 60
    });

    mpegtsInstance.attachMediaElement(video);
    mpegtsInstance.load();

    mpegtsInstance.on(mpegts.Events.ERROR, function(errorType, errorDetail, errorInfo) {
        debugLog('mpegts.js error: ' + errorType + ' ' + errorDetail);
        destroyAllPlayers();
        nextStrategy(video, ch.url, ch, strategyIndex);
    });

    mpegtsInstance.on(mpegts.Events.LOADING_COMPLETE, function() {
        debugLog('mpegts.js loading complete');
    });

    attemptPlay(video, ch, strategyIndex);
    setupVideoEvents(video, ch, strategyIndex);
    setupStallChecker(video, ch, strategyIndex);
}

// ==========================================
// NATIVE PLAYER
// ==========================================
function playNative(video, url, ch, isHLS, strategyIndex) {
    debugLog('Native play: ' + url.substring(0, 80) + ' isHLS=' + isHLS);

    video.src = url;

    if (isHLS) {
        var source = document.createElement('source');
        source.src = url;
        source.type = 'application/x-mpegURL';
        video.innerHTML = '';
        video.appendChild(source);
    }

    video.load();

    // Timeout for native loading
    const nativeTimeout = setTimeout(() => {
        if (video.readyState < 2 && !isPlaying) {
            debugLog('Native timeout, trying next strategy');
            nextStrategy(video, ch.url, ch, strategyIndex);
        }
    }, 20000);

    const origOnPlaying = video.onplaying;
    video.addEventListener('playing', function natPlaying() {
        clearTimeout(nativeTimeout);
        video.removeEventListener('playing', natPlaying);
    }, { once: true });

    attemptPlay(video, ch, strategyIndex);
    setupVideoEvents(video, ch, strategyIndex, nativeTimeout);
    setupStallChecker(video, ch, strategyIndex);
}

// ==========================================
// PLAY ATTEMPT - Her platform için optimize
// ==========================================
function attemptPlay(video, ch, strategyIndex) {
    var playAttempt = function(attempt) {
        if (attempt > 5) {
            debugLog('All play attempts failed for strategy #' + strategyIndex);
            // Don't give up - setup tap to play
            document.getElementById('bufferingSpinner').style.display = 'none';
            showToast('👆', 'Oynatmak için ekrana dokunun');
            setupTapToPlay(video);
            return;
        }

        debugLog('Play attempt #' + attempt + ' (strategy #' + strategyIndex + ')');

        var playPromise = video.play();
        if (playPromise !== undefined) {
            playPromise.then(function() {
                debugLog('Play started! attempt #' + attempt);
            }).catch(function(err) {
                debugLog('Play failed #' + attempt + ': ' + err.name + ': ' + err.message);

                if (err.name === 'NotAllowedError') {
                    // Autoplay engellendi
                    if (platformInfo.isAndroid || platformInfo.isIOS) {
                        // Mobilde muted autoplay dene
                        var wasMuted = video.muted;
                        video.muted = true;
                        video.play().then(function() {
                            debugLog('Muted autoplay worked');
                            setTimeout(function() {
                                video.muted = wasMuted;
                            }, 1000);
                        }).catch(function() {
                            video.muted = wasMuted;
                            debugLog('Even muted autoplay failed');
                            document.getElementById('bufferingSpinner').style.display = 'none';
                            showToast('👆', 'Oynatmak için ekrana dokunun');
                            setupTapToPlay(video);
                        });
                    } else {
                        document.getElementById('bufferingSpinner').style.display = 'none';
                        showToast('👆', 'Oynatmak için tıklayın');
                        setupTapToPlay(video);
                    }
                } else if (err.name === 'AbortError') {
                    setTimeout(function() { playAttempt(attempt + 1); }, 300 * attempt);
                } else if (err.name === 'NotSupportedError') {
                    debugLog('Format not supported, trying next strategy');
                    nextStrategy(video, ch.url, ch, strategyIndex);
                } else {
                    setTimeout(function() { playAttempt(attempt + 1); }, 500 * attempt);
                }
            });
        }
    };

    // Android'de biraz bekle
    if (platformInfo.isAndroid) {
        setTimeout(function() { playAttempt(1); }, 200);
    } else {
        playAttempt(1);
    }
}

// ==========================================
// TAP TO PLAY
// ==========================================
function setupTapToPlay(video) {
    var container = document.getElementById('videoContainer');

    function tapHandler(e) {
        if (e.target.closest('#playerControls') || e.target.closest('#channelInfoBar') ||
            e.target.closest('#sidebar') || e.target.closest('#categorySidebar')) return;

        debugLog('Tap-to-play triggered');
        video.muted = false;
        video.play().then(function() {
            debugLog('Tap-to-play: success');
            container.removeEventListener('click', tapHandler);
            container.removeEventListener('touchend', tapHandler);
        }).catch(function(err) {
            debugLog('Tap-to-play failed: ' + err.message);
            // Muted dene
            video.muted = true;
            video.play().then(function() {
                debugLog('Tap-to-play muted: success');
                container.removeEventListener('click', tapHandler);
                container.removeEventListener('touchend', tapHandler);
                showToast('🔇', 'Sessiz oynatılıyor, sesi açmak için 🔊 basın');
            }).catch(function(){});
        });
    }

    container.addEventListener('click', tapHandler);
    container.addEventListener('touchend', tapHandler, { passive: true });
}

// ==========================================
// VIDEO EVENT HANDLERS
// ==========================================
function setupVideoEvents(video, ch, strategyIndex, extraTimeout) {
    video.onplaying = function() {
        debugLog('Event: playing');
        document.getElementById('bufferingSpinner').style.display = 'none';
        isPlaying = true;
        document.getElementById('playPauseBtn').textContent = '⏸';
        hideBg();
    };

    video.onwaiting = function() {
        document.getElementById('bufferingSpinner').style.display = 'block';
    };

    video.oncanplay = function() {
        debugLog('Event: canplay readyState=' + video.readyState);
    };

    video.oncanplaythrough = function() {
        debugLog('Event: canplaythrough');
        document.getElementById('bufferingSpinner').style.display = 'none';
    };

    video.onloadedmetadata = function() {
        debugLog('Event: loadedmetadata ' + video.videoWidth + 'x' + video.videoHeight + ' dur=' + video.duration);
    };

    video.onloadeddata = function() {
        debugLog('Event: loadeddata');
        if (video.paused && !isPlaying) {
            video.play().catch(function(){});
        }
    };

    video.onstalled = function() {
        debugLog('Event: stalled');
    };

    video.onemptied = function() {
        debugLog('Event: emptied');
    };

    video.onerror = function(e) {
        var err = video.error;
        var msg = err ? ('code=' + err.code + ' msg=' + (err.message || 'unknown')) : 'unknown';
        debugLog('Event: error - ' + msg);

        if (extraTimeout) clearTimeout(extraTimeout);

        // error code 4 = MEDIA_ERR_SRC_NOT_SUPPORTED
        // error code 2 = MEDIA_ERR_NETWORK
        // error code 3 = MEDIA_ERR_DECODE
        if (err && (err.code === 4 || err.code === 2 || err.code === 3)) {
            debugLog('Video error, trying next strategy from #' + strategyIndex);
            destroyAllPlayers();
            nextStrategy(video, ch.url, ch, strategyIndex);
        } else {
            document.getElementById('bufferingSpinner').style.display = 'none';
            showToast('❌', 'Kanal yüklenemedi');
            showBg();
            currentPlayingUrl = '';
        }
    };

    video.onended = function() {
        debugLog('Event: ended (live stream ended?)');
        // Canlı yayın bitti, yeniden başlat
        setTimeout(() => {
            if (currentPlayingUrl === ch.url) {
                debugLog('Restarting ended stream');
                currentPlayingUrl = '';
                playChannel(focusedChannelIndex);
            }
        }, 3000);
    };
}

// ==========================================
// STALL CHECKER - Donma tespiti
// ==========================================
function setupStallChecker(video, ch, strategyIndex) {
    if (stallChecker) clearInterval(stallChecker);

    let lastTime = -1, stallCount = 0, totalStalls = 0;

    stallChecker = setInterval(function() {
        if (video.paused || video.ended || !isPlaying) return;

        if (video.currentTime === lastTime && video.readyState >= 2) {
            stallCount++;
            if (stallCount >= 2 && stallCount < 5) {
                debugLog('Stall #' + stallCount + ' at t=' + video.currentTime.toFixed(1));
                // Hafif ileri sar
                var b = video.buffered;
                if (b.length > 0) {
                    var buffEnd = b.end(b.length - 1);
                    if (buffEnd > video.currentTime + 1) {
                        video.currentTime = video.currentTime + 0.5;
                    }
                }
                // HLS.js varsa tekrar yükle
                if (hlsInstance) {
                    try { hlsInstance.startLoad(video.currentTime); } catch(e){}
                }
            } else if (stallCount >= 5) {
                totalStalls++;
                stallCount = 0;
                if (totalStalls >= 3) {
                    debugLog('Too many stalls, restarting stream');
                    totalStalls = 0;
                    currentPlayingUrl = '';
                    playChannel(focusedChannelIndex);
                }
            }
        } else {
            stallCount = 0;
        }
        lastTime = video.currentTime;
    }, 3000);
}

// ==========================================
// CHANNEL INFO BAR
// ==========================================
function showChannelInfoBar(ch){
    document.getElementById('infoBarNumber').textContent=ch.number;
    document.getElementById('infoBarName').textContent=ch.name;
    document.getElementById('infoBarGroup').textContent=ch.group||'';
    const bar=document.getElementById('channelInfoBar');bar.style.display='block';
    clearTimeout(overlayTimeout);overlayTimeout=setTimeout(()=>{bar.style.display='none';},5000);
}

function playNextChannel(){if(!filteredChannels.length)return;focusedChannelIndex=(focusedChannelIndex+1)%filteredChannels.length;playChannel(focusedChannelIndex);}
function playPrevChannel(){if(!filteredChannels.length)return;focusedChannelIndex=focusedChannelIndex<=0?filteredChannels.length-1:focusedChannelIndex-1;playChannel(focusedChannelIndex);}

function togglePlayPause(){const v=document.getElementById('videoPlayer');if(v.paused){v.play().catch(function(){});isPlaying=true;document.getElementById('playPauseBtn').textContent='⏸';}else{v.pause();isPlaying=false;document.getElementById('playPauseBtn').textContent='▶️';}}
function toggleMute(){const v=document.getElementById('videoPlayer');v.muted=!v.muted;document.getElementById('muteBtn').textContent=v.muted?'🔇':'🔊';document.getElementById('volumeSlider').value=v.muted?0:v.volume*100;}
function setVolume(val){const v=document.getElementById('videoPlayer');v.volume=val/100;v.muted=val==0;document.getElementById('muteBtn').textContent=val==0?'🔇':(val<50?'🔉':'🔊');}
function toggleFullscreen(){
    const el=document.documentElement;
    if(!document.fullscreenElement&&!document.webkitFullscreenElement&&!document.mozFullScreenElement&&!document.msFullscreenElement){
        if(el.requestFullscreen){el.requestFullscreen().catch(()=>{tryVideoFullscreen();});}
        else if(el.webkitRequestFullscreen){el.webkitRequestFullscreen();}
        else if(el.mozRequestFullScreen){el.mozRequestFullScreen();}
        else if(el.msRequestFullscreen){el.msRequestFullscreen();}
        else{tryVideoFullscreen();}
    }else{
        if(document.exitFullscreen){document.exitFullscreen().catch(()=>{});}
        else if(document.webkitExitFullscreen){document.webkitExitFullscreen();}
        else if(document.mozCancelFullScreen){document.mozCancelFullScreen();}
        else if(document.msExitFullscreen){document.msExitFullscreen();}
    }
}
function tryVideoFullscreen(){
    const video=document.getElementById('videoPlayer');
    if(video.webkitEnterFullscreen){video.webkitEnterFullscreen();}
    else if(video.requestFullscreen){video.requestFullscreen().catch(()=>{});}
    else if(video.webkitRequestFullscreen){video.webkitRequestFullscreen();}
}

function setupMouseEvents(){const p=document.getElementById('playerArea');p.addEventListener('mousemove',showControls);p.addEventListener('click',(e)=>{if(e.target===document.getElementById('videoPlayer')||e.target===document.getElementById('videoContainer'))showControls();});p.addEventListener('touchstart',showControls,{passive:true});}
function showControls(){const c=document.getElementById('playerControls');c.classList.add('visible');clearTimeout(controlsTimeout);controlsTimeout=setTimeout(()=>c.classList.remove('visible'),4000);}
function setupTouchGestures(){
    let sx=0,sy=0,st=0;const pl=document.getElementById('playerArea');
    pl.addEventListener('touchstart',(e)=>{if(e.target.closest('#playerControls')||e.target.closest('#channelInfoBar'))return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
    pl.addEventListener('touchend',(e)=>{if(e.target.closest('#playerControls')||e.target.closest('#channelInfoBar'))return;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Date.now()-st<500&&Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)){if(dx>0&&!sidebarVisible&&!catSidebarVisible){showSidebar();}else if(dx<0&&(sidebarVisible||catSidebarVisible))hideAllSidebars();}},{passive:true});
    const sb=document.getElementById('sidebar');let sbx=0;
    sb.addEventListener('touchstart',(e)=>{sbx=e.touches[0].clientX;},{passive:true});
    sb.addEventListener('touchend',(e)=>{if(e.changedTouches[0].clientX-sbx<-60)hideSidebar();},{passive:true});
    const csb=document.getElementById('categorySidebar');let csbx=0;
    csb.addEventListener('touchstart',(e)=>{csbx=e.touches[0].clientX;},{passive:true});
    csb.addEventListener('touchend',(e)=>{if(e.changedTouches[0].clientX-csbx<-60)hideCategorySidebar();},{passive:true});
}
function setupEventListeners(){document.addEventListener('keydown',handleKeydown);}

function handleKeydown(e){
    const ae=document.activeElement;if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT')){if(e.key==='Escape'){ae.blur();e.preventDefault();}return;}

    switch(e.key){
        case'ArrowLeft':e.preventDefault();
            if(focusMode==='channels'){showCategorySidebar();}
            else if(focusMode==='categories'){hideCategorySidebar();}
            else{showSidebar();}
            break;
        case'ArrowRight':e.preventDefault();
            if(focusMode==='categories'){hideCategorySidebar();showSidebar();}
            else if(focusMode==='channels'){hideSidebar();}
            break;
        case'ArrowUp':e.preventDefault();
            if(focusMode==='channels'){if(focusedChannelIndex>0){focusedChannelIndex--;updateFocusUI();}}
            else if(focusMode==='categories'){if(focusedCategoryIndex>0){focusedCategoryIndex--;renderCatList();}}
            else{if(currentChannelIndex>=0)playNextChannel();}
            break;
        case'ArrowDown':e.preventDefault();
            if(focusMode==='channels'){if(focusedChannelIndex<filteredChannels.length-1){focusedChannelIndex++;updateFocusUI();}}
            else if(focusMode==='categories'){if(focusedCategoryIndex<allCategoryNames.length-1){focusedCategoryIndex++;renderCatList();}}
            else{if(currentChannelIndex>=0)playPrevChannel();}
            break;
        case'ChannelUp':e.preventDefault();if(currentChannelIndex>=0)playNextChannel();break;
        case'ChannelDown':e.preventDefault();if(currentChannelIndex>=0)playPrevChannel();break;
        case'PageUp':e.preventDefault();if(currentChannelIndex>=0)playNextChannel();break;
        case'PageDown':e.preventDefault();if(currentChannelIndex>=0)playPrevChannel();break;
        case'Enter':e.preventDefault();
            if(focusMode==='categories'){const cn=allCategoryNames[focusedCategoryIndex];selectCategoryFromList(cn);}
            else if(focusMode==='channels'){if(filteredChannels.length>0)playChannel(focusedChannelIndex);}
            else{showSidebar();}
            break;
        case'Escape':case'Backspace':e.preventDefault();
            if(focusMode==='categories'){hideCategorySidebar();}
            else if(focusMode==='channels'){hideSidebar();}
            break;
        case' ':e.preventDefault();togglePlayPause();break;
        case'm':case'M':e.preventDefault();toggleMute();break;
        case'f':case'F':e.preventDefault();toggleFullscreen();break;
        case's':case'S':e.preventDefault();toggleSidebar();break;
        case'+':case'=':e.preventDefault();adjustVolume(5);break;
        case'-':case'_':e.preventDefault();adjustVolume(-5);break;
        default:if(e.key>='0'&&e.key<='9'){e.preventDefault();handleNumberInput(e.key);}break;
    }
}

function adjustVolume(d){const v=document.getElementById('videoPlayer');let n=Math.max(0,Math.min(1,v.volume+d/100));v.volume=n;v.muted=n===0;document.getElementById('volumeSlider').value=n*100;document.getElementById('muteBtn').textContent=n===0?'🔇':(n<.5?'🔉':'🔊');showToast('🔊',`Ses: %${Math.round(n*100)}`);}
function handleNumberInput(d){numberBuffer+=d;document.getElementById('numberDisplay').textContent=numberBuffer;document.getElementById('numberOverlay').style.display='block';clearTimeout(numberTimeout);numberTimeout=setTimeout(()=>{const n=parseInt(numberBuffer);numberBuffer='';document.getElementById('numberOverlay').style.display='none';const i=filteredChannels.findIndex(c=>c.number===n);if(i!==-1){focusedChannelIndex=i;playChannel(i);}else showToast('⚠️',`${n} numaralı kanal bulunamadı`);},1500);}
function showToast(i,m){const t=document.getElementById('toast');document.getElementById('toastContent').innerHTML=`<span>${i}</span> ${m}`;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.display='none';},3000);}
</script>
