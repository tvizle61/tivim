<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 CANLI TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #080b10;
    --bg2:    #0e1318;
    --bg3:    #141a22;
    --border: rgba(255,255,255,0.06);
    --accent: #e8373d;
    --gold:   #f5c842;
    --text:   #e8eaf0;
    --muted:  #5a6478;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Film grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ══ LAYOUT ONAYI (SOL PANEL 240PX'E DARALTILDI) ══ */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ══ SIDEBAR ══ */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Tabs */
  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    flex-shrink: 0;
  }

  .tab-btn {
    flex: 1;
    background: none; border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
    padding: 14px 4px;
    cursor: pointer;
    transition: all .2s;
  }

  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

  /* Alt bar için Category pills ayarları */
  .cat-bar {
    display: flex;
    gap: 6px;
    padding: 0 10px;
    overflow-x: auto;
    flex: 1;
    align-items: center;
  }

  .cat-bar::-webkit-scrollbar { height: 3px; }
  .cat-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .cat-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }

  .cat-pill.active, .cat-pill:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .ch-count {
    padding: 8px 16px 4px;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* Channel list scroll area */
  .channel-list {
    overflow-y: auto;
    flex: 1;
    padding: 6px 8px;
  }

  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* Channel item */
  .channel {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 8px;
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .2s;
    background: rgba(255,255,255,0.02);
  }

  .channel:hover { background: var(--bg3); }

  .channel.active {
    background: rgba(232,55,61,.15);
    border: 2px solid var(--accent) !important;
  }

  .ch-logo {
    width: 38px; height: 38px;
    border-radius: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .ch-logo img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 3px;
    background: #0e1318;
  }

  .ch-info { flex: 1; min-width: 0; }

  .ch-name {
    font-size: 13px; font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ch-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }

  .live-badge {
    background: var(--accent); color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 2px 5px; border-radius: 3px;
    flex-shrink: 0;
  }

  .ch-group {
    font-size: 11px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .fav-btn {
    background: none; border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    transition: color .2s, transform .2s;
    flex-shrink: 0;
    padding: 3px;
    line-height: 1;
  }

  .fav-btn:hover  { color: var(--gold); transform: scale(1.2); }
  .fav-btn.on     { color: var(--gold); }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 12px;
  }

  .spin {
    width: 32px; height: 32px;
    border: 2px solid var(--bg3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══ MAIN ══ */
  .main {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #000;
  }

  /* ══ PLAYER WRAPPER ══ */
  .player-wrap { 
    position: relative; 
    background: #000; 
    flex: 1; 
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .player-ratio {
    position: relative;
    width: 100%;
    flex: 1;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .player-idle {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #0d1520 0%, #000 70%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    z-index: 2;
  }

  .idle-icon {
    font-size: 64px; opacity: .13;
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100% { opacity:.08; transform:scale(1); }
    50%      { opacity:.2;  transform:scale(1.05); }
  }

  .idle-txt {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 4px;
    color: var(--muted);
  }

  #video {
    width: 100%; 
    height: 100%;
    background: #000;
    display: none;
    object-fit: cover;
  }

  /* Fullscreen hint */
  .fs-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s;
    pointer-events: none;
    z-index: 3;
  }

  .player-ratio:hover .fs-hint { opacity: 1; }

  .fs-btn {
    background: rgba(0,0,0,.6);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px; color: #fff;
    font-size: 12px; padding: 6px 14px;
    backdrop-filter: blur(4px);
    pointer-events: all;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
  }

  /* EN ALTTAKI KONTROL BARI */
  .ctrl-bar {
    background: linear-gradient(to right, var(--bg2), var(--bg3));
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    flex-shrink: 0;
    gap: 16px;
    z-index: 5;
  }

  .ctrl-btns { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    flex-shrink: 0;
  }

  .cb {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .2s;
  }

  .cb:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: translateY(-1px); }
  .cb.danger:hover { background: #c0392b; border-color: #c0392b; }

  /* ══ SLEEP MODAL ══ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
    z-index: 200; display: none;
    align-items: center; justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 320px;
    animation: slideUp .3s ease;
  }

  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .timer-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }

  .t-opt {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; text-align: center;
    cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--text); transition: all .2s;
  }

  .t-opt:hover, .t-opt.sel {
    background: rgba(232,55,61,.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .t-cd {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 2px;
    color: var(--gold); padding: 6px 0;
    display: none;
  }

  .modal-acts { display: flex; gap: 10px; }

  .btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s;
  }

  .btn-p { background: var(--accent); color: #fff; }
  .btn-p:hover { background: #c0392b; }
  .btn-s { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .btn-s:hover { color: var(--text); }

  /* ══ TOAST ══ */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 12px 18px;
    font-size: 13px; font-weight: 500;
    z-index: 500;
    transform: translateY(60px); opacity: 0;
    transition: all .3s; max-width: 280px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

  /* ══ MOBIL UYUM ══ */
  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
      height: auto;
      min-height: 100vh;
    }

    .main    { order: 1; height: auto; }
    .sidebar { order: 2; border-right: none; border-top: 1px solid var(--border); }

    .player-ratio { height: 56.25vw; flex: none; }
    .idle-icon { font-size: 40px; }
    .idle-txt  { font-size: 13px; letter-spacing: 2px; }

    .ctrl-bar {
      flex-wrap: nowrap !important;
      justify-content: flex-start !important;
      padding: 10px 14px;
      gap: 12px;
    }

    .ctrl-btns { 
      width: auto; 
      gap: 6px; 
    }
    
    .cb { 
      flex: none !important; 
      width: 34px; 
      height: 34px; 
      font-size: 13px; 
    }

    .sidebar-tabs  { padding: 0 12px; }
    .tab-btn       { font-size: 10px; padding: 11px 4px; }
    .ch-count      { padding: 6px 12px 2px; }
    .channel-list  { max-height: 42vh; }

    .channel  { padding: 8px 10px; gap: 10px; }
    .ch-logo  { width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0; }
    .ch-name  { font-size: 12px; }
    .ch-group { font-size: 10px; }
  }

  @media (max-width: 380px) {
    .ctrl-bar { gap: 8px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('all', this)">TÜM KANALLAR</button>
      <button class="tab-btn" onclick="switchTab('fav', this)">⭐ FAVORİLER</button>
    </div>
    <div class="ch-count" id="chCount"></div>
    <div class="channel-list" id="channelList">
      <div class="loading">
        <div class="spin"></div>
        Kanallar yükleniyor...
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main">
    <div class="player-wrap">
      
      <div class="player-ratio">
        <div class="player-idle" id="playerIdle">
          <div class="idle-icon">📺</div>
          <div class="idle-txt">İZLEMEK İÇİN KANAL SEÇİN</div>
        </div>
        <video id="video" controls playsinline></video>
        <div class="fs-hint">
          <button class="fs-btn" onclick="openFS()">⛶ TAM EKRAN</button>
        </div>
      </div>

      <!-- CONTROLS + CATEGORIES -->
      <div class="ctrl-bar">
        <div class="ctrl-btns">
          <button class="cb" onclick="openFS()" title="Tam Ekran">⛶</button>
          <button class="cb" onclick="prevCh()" title="Önceki (←)">⏮</button>
          <button class="cb danger" onclick="stopPlayer()" title="Durdur (Esc)">⏹</button>
          <button class="cb" onclick="nextCh()" title="Sonraki (→)">⏭</button>
                    
        </div>
        <div class="cat-bar" id="catBar">
          <button class="cat-pill active" onclick="filterCat('', this)">Tümü</button>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- SLEEP MODAL -->
<div class="modal-overlay" id="sleepModal">
  <div class="modal">
    <div class="modal-title">⏱ UYKU ZAMANLAYICISI</div>
    <div class="timer-opts">
      <div class="t-opt" onclick="pickTimer(15,this)">15 dk</div>
      <div class="t-opt sel" onclick="pickTimer(30,this)">30 dk</div>
      <div class="t-opt" onclick="pickTimer(60,this)">1 saat</div>
      <div class="t-opt" onclick="pickTimer(90,this)">1.5 saat</div>
      <div class="t-opt" onclick="pickTimer(120,this)">2 saat</div>
      <div class="t-opt" onclick="pickTimer(0,this)">İptal Et</div>
    </div>
    <div class="t-cd" id="timerCd"></div>
    <div class="modal-acts">
      <button class="btn btn-s" onclick="closeSleep()">Vazgeç</button>
      <button class="btn btn-p" onclick="startSleep()">Başlat</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const M3U_URLS = [
  "https://raw.githubusercontent.com/kadirsener1/avva/refs/heads/main/playlist.m3u",
  "https://raw.githubusercontent.com/tvizle61/tv/refs/heads/main/yerel1.m3u",
  "https://example.com/ucuncu_playlist.m3u"
];

let hls;
let favorites   = JSON.parse(localStorage.getItem("favorites") || "[]");
let allChannels = [];
let currentCh   = null;
let currentTab  = "all";
let currentCat  = "";

const fetchPromises = M3U_URLS.map(url => 
  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error("Yüklenemedi");
      return r.text();
    })
    .catch(err => {
      console.error(`Link yüklenirken hata oluştu: ${url}`, err);
      return "";
    })
);

Promise.all(fetchPromises)
  .then(results => {
    results.forEach(text => {
      if (!text) return;

      const lines = text.split("\n");
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith("#EXTINF")) {
          const name  = lines[i].split(",")[1]?.trim() || "Kanal";
          const url   = lines[i + 1]?.trim() || "";
          if (!url.startsWith("http")) continue;
          const gm    = lines[i].match(/group-title="([^"]*)"/i);
          const lm    = lines[i].match(/tvg-logo="([^"]*)"/i);
          
          allChannels.push({
            name,
            url,
            group: gm ? gm[1].trim() || "Genel" : "Genel",
            logo:  lm ? lm[1].trim() : ""
          });
        }
      }
    });

    if (allChannels.length === 0) {
      throw new Error("Hiç kanal bulunamadı");
    }

    buildCats();
    renderList();
  })
  .catch(() => {
    document.getElementById("channelList").innerHTML =
      '<div style="padding:20px;color:var(--muted);font-size:13px;text-align:center">❌ Yükleme hatası (Hiçbir liste yüklenemedi)</div>';
  });

function buildCats() {
  const groups = ["", ...new Set(allChannels.map(c => c.group))].slice(0, 20);
  const bar = document.getElementById("catBar");
  bar.innerHTML = groups.map((g, i) =>
    `<button class="cat-pill ${i === 0 ? "active" : ""}" onclick="filterCat('${g.replace(/'/g,"\\'")}',this)">${i === 0 ? "Tümü" : g}</button>`
  ).join("");
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll(".cat-pill").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderList();
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderList();
}

function renderList() {
  let list = allChannels;
  if (currentTab === "fav") list = list.filter(c => favorites.includes(c.url));
  if (currentCat)            list = list.filter(c => c.group === currentCat);

  document.getElementById("chCount").textContent = list.length + " kanal";
  const el = document.getElementById("channelList");

  if (!list.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px 16px;color:var(--muted);font-size:13px;">
      ${currentTab === "fav" ? "⭐ Favori yok" : " Sonuç yok"}
    </div>`;
    return;
  }

  el.innerHTML = list.map(ch => {
    const idx   = allChannels.indexOf(ch);
    const isAct = currentCh?.url === ch.url;
    const isFav = favorites.includes(ch.url);
    const logo  = ch.logo
      ? `<img src="${ch.logo}" loading="lazy" onerror="this.outerHTML='<span>📺</span>'">`
      : `<span>📺</span>`;
    const u = ch.url.replace(/\\/g, "\\\\").replace(/'/g, "\\'");

    return `
      <div class="channel ${isAct ? "active" : ""}" onclick="play(${idx})">
        <div class="ch-logo">${logo}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-meta">
            <span class="live-badge">CANLI</span>
            <span class="ch-group">${ch.group}</span>
          </div>
        </div>
        <button class="fav-btn ${isFav ? "on" : ""}"
          onclick="event.stopPropagation(); toggleFavorite('${u}', this)">
          ${isFav ? "★" : "☆"}
        </button>
      </div>`;
  }).join("");
}

const video = document.getElementById("video");

function play(idx) {
  const ch = allChannels[idx];
  if (!ch) return;
  currentCh = ch;

  document.getElementById("playerIdle").style.display = "none";
  video.style.display = "block";

  if (Hls.isSupported()) {
    if (hls) hls.destroy();
    hls = new Hls();
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = ch.url;
    video.play().catch(() => {});
  } else {
    video.src = ch.url;
  }

  renderList();
  showToast("▶ " + ch.name);
}

function stopPlayer() {
  if (hls) { hls.destroy(); hls = null; }
  video.pause(); video.src = ""; video.style.display = "none";
  document.getElementById("playerIdle").style.display = "flex";
  currentCh = null;
  renderList();
}

function getFiltered() {
  let list = allChannels;
  if (currentTab === "fav") list = list.filter(c => favorites.includes(c.url));
  if (currentCat)            list = list.filter(c => c.group === currentCat);
  return list;
}

function nextCh() {
  const list = getFiltered();
  if (!list.length) return;
  const idx  = list.findIndex(c => c.url === currentCh?.url);
  play(allChannels.indexOf(list[(idx + 1) % list.length]));
}

function prevCh() {
  const list = getFiltered();
  if (!list.length) return;
  const idx  = list.findIndex(c => c.url === currentCh?.url);
  play(allChannels.indexOf(list[(idx - 1 + list.length) % list.length]));
}

function openFS() {
  const el = document.querySelector(".player-ratio");
  (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
}

function toggleFavorite(url, btn) {
  if (favorites.includes(url)) {
    favorites = favorites.filter(u => u !== url);
    btn.textContent = "☆";
    btn.classList.remove("on");
    showToast("Favorilerden çıkarıldı");
  } else {
    favorites.push(url);
    btn.textContent = "★";
    btn.classList.add("on");
    showToast("⭐ Favorilere eklendi");
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderList();
}

/* ── TOAST ── */
let toastT;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove("show"), 2800);
}

/* ── SLEEP TIMER ── */
let sleepSel = 30, sleepTimer = null, cdInterval = null;

function pickTimer(min, el) {
  sleepSel = min;
  document.querySelectorAll(".t-opt").forEach(o => o.classList.remove("sel"));
  el.classList.add("sel");
}

function openSleep()  { document.getElementById("sleepModal").classList.add("open"); }
function closeSleep() { document.getElementById("sleepModal").classList.remove("open"); }

function startSleep() {
  clearTimeout(sleepTimer); clearInterval(cdInterval);
  if (sleepSel === 0) {
    document.getElementById("timerCd").style.display = "none";
    showToast("Zamanlayıcı iptal edildi"); closeSleep(); return;
  }
  sleepTimer = setTimeout(() => {
    stopPlayer();
    showToast("⏱ " + sleepSel + " dk doldu. Yayın durduruldu.");
  }, sleepSel * 60000);
  let rem = sleepSel * 60;
  const cd = document.getElementById("timerCd"); cd.style.display = "block";
  cdInterval = setInterval(() => {
    rem--;
    if (rem <= 0) { clearInterval(cdInterval); cd.style.display = "none"; return; }
    cd.textContent = "⏱ Kalan: " + Math.floor(rem / 60) + ":" + String(rem % 60).padStart(2, "0");
  }, 1000);
  showToast("⏱ " + sleepSel + " dk sonra kapanacak"); closeSleep();
}

document.getElementById("sleepModal").addEventListener("click", e => {
  if (e.target === document.getElementById("sleepModal")) closeSleep();
});

/* ── KEYBOARD ── */
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowRight") nextCh();
  if (e.key === "ArrowLeft")  prevCh();
  if (e.key === "Escape")     stopPlayer();
  if (e.key === "f" || e.key === "F") openFS();
  if (e.key === "m" || e.key === "M") {
    video.muted = !video.muted;
    showToast(video.muted ? "🔇 Sessiz" : "🔊 Ses Açık");
  }
});
</script>
