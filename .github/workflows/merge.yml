name: M3U Merge

on:
  schedule:
    - cron: "*/35 * * * *" 

  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Paketleri yükle
        run: pip install -r requirements.txt

      - name: Script çalıştır
        run: python merge.py

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add merged.m3u
          git commit -m "M3U otomatik güncellendi" || echo "Değişiklik yok"
          git push
